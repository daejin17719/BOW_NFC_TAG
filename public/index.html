<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울대학교 국궁부 공용 장비 관리 체계</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #070d1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: -0.04em;
    }

    .page {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 28px 12px;
      background: #070d1a;
    }

    .heroCard {
      position: relative;
      width: 100%;
      min-height: 195px;
      padding: 22px 22px 19px;
      border-radius: 22px;
      background: #e7edf5;
      color: #0b1220;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .heroRibbon {
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 34px;
      background: #1e293b;
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(45deg) translate(26px, -11px);
      transform-origin: center;
      z-index: 2;
    }

    .heroMetrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .heroMetric {
      min-width: 0;
    }

    .poundMetric {
      text-align: right;
      padding-top: 18px;
    }

    .metricLabel {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 900;
      color: #526071;
      line-height: 1;
    }

    .metricValue {
      font-size: 52px;
      font-weight: 950;
      line-height: 0.88;
      letter-spacing: -0.07em;
      color: #0b1220;
      white-space: nowrap;
    }

    .metricValue.personalCode {
      font-size: 52px;
    }

    .metricValue .unit {
      margin-left: 4px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #5d6878;
      vertical-align: baseline;
    }

    .heroSubInfo {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 27px;
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -0.07em;
      color: #0b1220;
    }

    .statusBadge {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 28px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .statusBadge.normal {
      background: #bbf7d0;
      color: #166534;
    }

    .statusBadge.repair {
      background: #fde68a;
      color: #92400e;
    }

    .statusBadge.bad {
      background: #fecaca;
      color: #991b1b;
    }

    .section {
      margin-top: 12px;
      padding: 17px 16px 18px;
      border-radius: 20px;
      background: #0c1322;
    }

    .sectionTitle {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 950;
      color: #ffffff;
    }

    .infoGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .infoBox {
      min-height: 64px;
      padding: 12px 12px 11px;
      border-radius: 13px;
      background: #121b2e;
    }

    .infoBox.wide {
      grid-column: 1 / -1;
    }

    .infoLabel {
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      color: #93c5fd;
    }

    .infoValue {
      font-size: 17px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.25;
      word-break: keep-all;
    }

    .repairForm {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      padding: 14px;
      border: 0;
      outline: none;
      border-radius: 12px;
      background: #121b2e;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.45;
    }

    textarea::placeholder {
      color: #8aa0bd;
    }

    button {
      width: 100%;
      height: 47px;
      border: 0;
      border-radius: 14px;
      background: #3b4c63;
      color: #ffffff;
      font-size: 15px;
      font-weight: 950;
      font-family: inherit;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .linkButton {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 42px;
      border-radius: 14px;
      background: #1d293b;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      color: #93c5fd;
    }

    .footerTitle {
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
    }

    .copyright {
      font-size: 10.5px;
      line-height: 1.35;
      color: #93c5fd;
    }

    @media (max-width: 380px) {
      .page {
        padding-left: 18px;
        padding-right: 18px;
      }

      .metricValue,
      .metricValue.personalCode {
        font-size: 48px;
      }

      .heroSubInfo {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="heroCard">
      <div class="heroRibbon" id="heroRibbon">정상 장비</div>

      <div class="heroMetrics">
        <div class="heroMetric">
          <div class="metricLabel">일련번호</div>
          <div class="metricValue personalCode" id="heroSerial">14</div>
        </div>

        <div class="heroMetric poundMetric">
          <div class="metricLabel">파운드</div>
          <div class="metricValue">
            <span id="heroPound">38</span><span class="unit">lb</span>
          </div>
        </div>
      </div>

      <div class="heroSubInfo">
        <span id="heroBrand">가야궁</span>
        <span id="heroSize">장</span>
      </div>

      <div class="statusBadge normal" id="heroStatus">정상</div>
    </section>

    <section class="section">
      <h2 class="sectionTitle">장비 정보</h2>

      <div class="infoGrid">
        <div class="infoBox">
          <div class="infoLabel">일련번호</div>
          <div class="infoValue" id="serialValue">14</div>
        </div>

        <div class="infoBox">
          <div class="infoLabel">상태</div>
          <div class="infoValue" id="statusValue">정상</div>
        </div>

        <div class="infoBox">
          <div class="infoLabel">브랜드</div>
          <div class="infoValue" id="brandValue">가야궁</div>
        </div>

        <div class="infoBox">
          <div class="infoLabel">사이즈</div>
          <div class="infoValue" id="sizeValue">장</div>
        </div>

        <div class="infoBox">
          <div class="infoLabel">파운드</div>
          <div class="infoValue" id="poundValue">38 lb</div>
        </div>

        <div class="infoBox">
          <div class="infoLabel">기타</div>
          <div class="infoValue" id="etcValue">-</div>
        </div>

        <div class="infoBox wide">
          <div class="infoLabel">점검 내역</div>
          <div class="infoValue" id="checkValue">-</div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="sectionTitle">수리 요청</h2>

      <form class="repairForm" id="repairForm">
        <textarea
          id="repairText"
          placeholder="수리가 필요한 내용을 입력하세요."
        ></textarea>

        <button type="submit">제출</button>
      </form>
    </section>

    <a class="linkButton" href="#" id="publicStatusLink">
      공용 장비 현황
    </a>

    <footer class="footer">
      <div class="footerTitle">
        서울대학교 국궁부 공용 장비 관리 체계
      </div>
      <div class="copyright">
        Copyright © Seoul National University Korean Archery Club.
        All Rights Reserved.
      </div>
    </footer>
  </main>

  <script>
    const equipment = {
      serial: "14",
      status: "정상",
      brand: "가야궁",
      size: "장",
      pound: "38",
      etc: "-",
      checkHistory: "-"
    };

    const statusMap = {
      "정상": {
        badgeClass: "normal",
        ribbonText: "정상 장비"
      },
      "수리 필요": {
        badgeClass: "repair",
        ribbonText: "수리 필요"
      },
      "불량": {
        badgeClass: "bad",
        ribbonText: "불량 장비"
      }
    };

    function renderEquipment(data) {
      const statusInfo = statusMap[data.status] || statusMap["정상"];

      document.getElementById("heroSerial").textContent = data.serial;
      document.getElementById("heroPound").textContent = data.pound;
      document.getElementById("heroBrand").textContent = data.brand;
      document.getElementById("heroSize").textContent = data.size;

      const heroStatus = document.getElementById("heroStatus");
      heroStatus.textContent = data.status;
      heroStatus.className = `statusBadge ${statusInfo.badgeClass}`;

      const heroRibbon = document.getElementById("heroRibbon");
      heroRibbon.textContent = statusInfo.ribbonText;

      document.getElementById("serialValue").textContent = data.serial;
      document.getElementById("statusValue").textContent = data.status;
      document.getElementById("brandValue").textContent = data.brand;
      document.getElementById("sizeValue").textContent = data.size;
      document.getElementById("poundValue").textContent = `${data.pound} lb`;
      document.getElementById("etcValue").textContent = data.etc || "-";
      document.getElementById("checkValue").textContent = data.checkHistory || "-";
    }

    document.getElementById("repairForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const text = document.getElementById("repairText").value.trim();

      if (!text) {
        alert("수리 요청 내용을 입력해주세요.");
        return;
      }

      alert("수리 요청이 제출되었습니다.");
      document.getElementById("repairText").value = "";
    });

    renderEquipment(equipment);
  </script>
</body>
</html>

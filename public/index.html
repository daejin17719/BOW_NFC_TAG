<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울대학교 국궁부 공용 장비 관리 체계</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #070d1a;
      --text-dark: #020617;
      --card-normal: #2ddc83;
      --card-repair: #facc15;
      --card-bad: #f87171;
      --panel-dark: #0c1322;
      --panel-inner: #121b2e;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: -0.04em;
    }

    .page {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 10px 20px 12px;
      background: var(--bg);
    }

    .equipmentCard {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 22px);
      padding: 34px 26px 18px;
      border: 1.5px solid #020617;
      border-radius: 22px;
      background: var(--card-normal);
      color: var(--text-dark);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .equipmentCard.normal {
      background: var(--card-normal);
    }

    .equipmentCard.repair {
      background: var(--card-repair);
    }

    .equipmentCard.bad {
      background: var(--card-bad);
    }

    .clubBadge {
      position: absolute;
      top: 17px;
      right: 20px;
      min-width: 128px;
      height: 30px;
      padding: 0 18px;
      border-radius: 999px;
      background: #020617;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: -0.06em;
      white-space: nowrap;
    }

    .clubBadge span {
      color: #2ddc83;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .infoTitle {
      margin: 0;
      font-size: 80px;
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .mainMetric {
      margin-top: 34px;
      display: flex;
      align-items: baseline;
      gap: 11px;
      color: #020617;
      white-space: nowrap;
    }

    .serialNumber,
    .poundNumber {
      font-size: 80px;
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .metricDivider {
      font-size: 72px;
      font-weight: 400;
      line-height: 0.9;
    }

    .metricUnitKo {
      font-size: 42px;
      font-weight: 400;
      line-height: 1;
    }

    .metricUnitLb {
      margin-left: -4px;
      font-size: 36px;
      font-weight: 400;
      line-height: 1;
    }

    .statusBar {
      margin-top: 64px;
      width: 100%;
      height: 32px;
      border: 1.5px solid #020617;
      display: grid;
      grid-template-columns: 58px 66px 1fr;
      color: #020617;
    }

    .statusCell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid #020617;
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
    }

    .statusCell:last-child {
      border-right: 0;
    }

    .detailGrid {
      margin-top: 42px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 42px;
      row-gap: 28px;
    }

    .detailBlock {
      min-width: 0;
    }

    .detailLabel {
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      color: #020617;
    }

    .detailValue {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.05;
      color: #020617;
      word-break: keep-all;
    }

    .detailValue.small {
      font-size: 39px;
    }

    .scrollHint {
      margin-top: auto;
      padding-top: 26px;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #020617;
    }

    .repairSection {
      margin-top: 14px;
      padding: 24px 20px 22px;
      border: 1.5px solid #020617;
      border-radius: 22px;
      background: var(--card-normal);
      color: #020617;
    }

    .repairSection.normal {
      background: var(--card-normal);
    }

    .repairSection.repair {
      background: var(--card-repair);
    }

    .repairSection.bad {
      background: var(--card-bad);
    }

    .repairTitle {
      margin: 0 0 18px;
      font-size: 42px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.08em;
    }

    .repairGuide {
      margin: 0 0 18px;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.45;
    }

    .repairForm {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 15px;
      border: 1.5px solid #020617;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: #020617;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.45;
    }

    textarea::placeholder {
      color: rgba(2, 6, 23, 0.55);
    }

    button {
      width: 100%;
      height: 48px;
      border: 1.5px solid #020617;
      border-radius: 0;
      background: #020617;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .linkButton {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 42px;
      border-radius: 14px;
      background: #1d293b;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    .footer {
      margin-top: 12px;
      padding-bottom: 6px;
      text-align: center;
      color: #93c5fd;
    }

    .footerTitle {
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
    }

    .copyright {
      font-size: 10.5px;
      line-height: 1.35;
      color: #93c5fd;
    }

    @media (max-width: 380px) {
      .page {
        padding-left: 16px;
        padding-right: 16px;
      }

      .equipmentCard {
        padding-left: 24px;
        padding-right: 24px;
      }

      .infoTitle {
        font-size: 72px;
      }

      .serialNumber,
      .poundNumber {
        font-size: 72px;
      }

      .metricDivider {
        font-size: 64px;
      }

      .metricUnitKo {
        font-size: 38px;
      }

      .metricUnitLb {
        font-size: 32px;
      }

      .detailGrid {
        column-gap: 28px;
      }

      .detailLabel {
        font-size: 25px;
      }

      .detailValue {
        font-size: 38px;
      }

      .detailValue.small {
        font-size: 35px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="equipmentCard normal" id="equipmentCard">
      <div class="clubBadge">
        서울대학교&nbsp;<span>국궁부</span>
      </div>

      <h1 class="infoTitle">Info</h1>

      <div class="mainMetric">
        <span class="serialNumber" id="heroSerial">27</span>
        <span class="metricUnitKo">번</span>
        <span class="metricDivider">/</span>
        <span class="poundNumber" id="heroPound">45</span>
        <span class="metricUnitLb">lb</span>
      </div>

      <div class="statusBar">
        <div class="statusCell" id="statusCell">정상</div>
        <div class="statusCell">공용 장비</div>
        <div class="statusCell"></div>
      </div>

      <div class="detailGrid">
        <div class="detailBlock">
          <div class="detailLabel">브랜드</div>
          <div class="detailValue" id="brandValue">혁무궁</div>
        </div>

        <div class="detailBlock">
          <div class="detailLabel">사이즈</div>
          <div class="detailValue" id="sizeValue">장</div>
        </div>

        <div class="detailBlock">
          <div class="detailLabel">기타</div>
          <div class="detailValue" id="etcValue">-</div>
        </div>

        <div class="detailBlock">
          <div class="detailLabel">점검내역</div>
          <div class="detailValue small" id="checkValue">2026-06-10</div>
        </div>
      </div>

      <div class="scrollHint">아래로 스크롤해 수리 요청</div>
    </section>

    <section class="repairSection normal" id="repairSection">
      <h2 class="repairTitle">Repair</h2>

      <p class="repairGuide">
        장비에 문제가 있거나 점검이 필요한 경우 아래에 내용을 적어 제출하세요.
      </p>

      <form class="repairForm" id="repairForm">
        <textarea
          id="repairText"
          placeholder="수리가 필요한 내용을 입력하세요."
        ></textarea>

        <button type="submit">제출</button>
      </form>
    </section>

    <a class="linkButton" href="#" id="publicStatusLink">
      공용 장비 현황
    </a>

    <footer class="footer">
      <div class="footerTitle">
        서울대학교 국궁부 공용 장비 관리 체계
      </div>
      <div class="copyright">
        Copyright © Seoul National University Korean Archery Club.
        All Rights Reserved.
      </div>
    </footer>
  </main>

  <script>
    const equipment = {
      serial: "27",
      status: "정상",
      brand: "혁무궁",
      size: "장",
      pound: "45",
      etc: "-",
      checkHistory: "2026-06-10"
    };

    const statusStyleMap = {
      "정상": "normal",
      "수리 필요": "repair",
      "불량": "bad"
    };

    function renderEquipment(data) {
      const statusClass = statusStyleMap[data.status] || "normal";

      const equipmentCard = document.getElementById("equipmentCard");
      const repairSection = document.getElementById("repairSection");

      equipmentCard.className = `equipmentCard ${statusClass}`;
      repairSection.className = `repairSection ${statusClass}`;

      document.getElementById("heroSerial").textContent = data.serial;
      document.getElementById("heroPound").textContent = data.pound;
      document.getElementById("statusCell").textContent = data.status;
      document.getElementById("brandValue").textContent = data.brand || "-";
      document.getElementById("sizeValue").textContent = data.size || "-";
      document.getElementById("etcValue").textContent = data.etc || "-";
      document.getElementById("checkValue").textContent = data.checkHistory || "-";
    }

    document.getElementById("repairForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const text = document.getElementById("repairText").value.trim();

      if (!text) {
        alert("수리 요청 내용을 입력해주세요.");
        return;
      }

      alert("수리 요청이 제출되었습니다.");
      document.getElementById("repairText").value = "";
    });

    renderEquipment(equipment);
  </script>
</body>
</html>

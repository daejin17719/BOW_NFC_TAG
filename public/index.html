<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 장비 정보</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding-bottom: 28px;
    }

    .loadingLogoWrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .errorBox {
      position: relative;
      overflow: hidden;
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 14px auto;
      background: #fff7ed;
      color: #7c2d12;
      border: 1px solid #fed7aa;
      border-radius: 24px;
      padding: 22px 22px 20px;
      box-shadow: 0 10px 28px rgba(124, 45, 18, 0.10);
      font-weight: 850;
      line-height: 1.5;
    }

    .errorBox::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: #f97316;
    }

    .errorTitle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .errorIcon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffedd5;
      color: #c2410c;
      font-size: 16px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .errorMessage {
      font-size: 15px;
      font-weight: 850;
      color: #9a3412;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .errorAction {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 850;
      color: #c2410c;
    }

    .topCard {
      width: 100%;
      min-height: 100dvh;
      background: #f8fafc;
      color: #030712;
      padding: 18px 20px 22px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }

    .topCardInner {
      width: 100%;
      max-width: 480px;
      min-height: calc(100dvh - 40px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .topNav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .navLeft {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .backMark {
      font-size: 18px;
      font-weight: 950;
      line-height: 1;
    }

    .navTitle {
      font-size: 15px;
      font-weight: 900;
      color: #030712;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .navType {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 950;
      padding: 7px 11px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111827;
    }

    .heroArea {
      flex: 0 0 auto;
      min-height: 310px;
      position: relative;
      border-bottom: 1.5px solid rgba(3, 7, 18, 0.10);
      margin-bottom: 22px;
    }

    .heroMetric {
      position: absolute;
      min-width: 0;
    }

    .serialMetric {
      top: 0;
      left: 0;
      width: 78%;
    }

    .poundMetric {
      top: 150px;
      right: 0;
      width: 78%;
      text-align: right;
    }

    .metricLabel {
      font-size: 14px;
      font-weight: 850;
      color: rgba(3, 7, 18, 0.52);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .metricValue {
      font-size: 116px;
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: -0.085em;
      color: #030712;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .metricValue.personalCode {
      font-size: 66px;
      line-height: 0.96;
      letter-spacing: -0.07em;
    }

    .metricValue .unit {
      font-size: 32px;
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-left: 5px;
    }

    .heroSubInfo {
      position: absolute;
      right: 2px;
      top: 74px;
      text-align: right;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 850;
      color: rgba(3, 7, 18, 0.58);
      max-width: 130px;
      word-break: keep-all;
    }

    .ticketCard {
      margin-top: auto;
      border-radius: 24px;
      padding: 18px;
      color: #050505;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.12);
      max-height: none;
      overflow: hidden;
    }

    .ticket-normal {
      background: linear-gradient(135deg, #bbf7d0 0%, #86efac 100%);
    }

    .ticket-repair {
      background: linear-gradient(135deg, #fecaca 0%, #fca5a5 100%);
    }

    .ticket-bad {
      background: linear-gradient(135deg, #fde68a 0%, #facc15 100%);
    }

    .ticket-deleted {
      background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
    }

    .ticketTop {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 16px;
    }

    .ticketLabel {
      font-size: 10px;
      line-height: 1.2;
      font-weight: 900;
      color: rgba(5, 5, 5, 0.48);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .ticketMain {
      font-size: 25px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -0.045em;
      color: #050505;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .ticketStatus {
      text-align: right;
    }

    .ticketStatus .ticketMain {
      white-space: nowrap;
    }

    .ticketGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px 18px;
      margin-bottom: 10px;
    }

    .ticketItem {
      min-width: 0;
    }

    .ticketValue {
      font-size: 17px;
      line-height: 1.22;
      font-weight: 950;
      letter-spacing: -0.03em;
      color: #050505;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .ticketItem.full {
      grid-column: 1 / -1;
    }

    .ticketNoticeRow {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1.5px solid rgba(5, 5, 5, 0.14);
    }

    .badge,
    .repairNotice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 31px;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 13px;
      box-shadow: none;
    }

    .badge.normal {
      background: #050505;
      color: #ffffff;
    }

    .badge.repair {
      background: #ffffff;
      color: #991b1b;
    }

    .badge.bad {
      background: #050505;
      color: #facc15;
    }

    .badge.deleted {
      background: #050505;
      color: #d1d5db;
    }

    .repairNotice {
      background: rgba(5, 5, 5, 0.10);
      color: #050505;
      border: 1.5px solid rgba(5, 5, 5, 0.16);
    }

    .repairNotice.hidden {
      display: none;
    }

    .banNotice {
      background: rgba(5, 5, 5, 0.10);
      color: #050505;
      border: 1.5px solid rgba(5, 5, 5, 0.16);
    }

    .scrollHint {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 900;
      color: rgba(3, 7, 18, 0.46);
      text-align: center;
    }

    .section {
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 0 auto 14px;
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    #repairRequest {
      font-size: 17px;
      color: var(--text);
    }

    #repairRequest::placeholder {
      font-size: 16px;
      color: #7b8798;
      font-weight: 500;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .completeBtn {
      margin-top: 10px;
      background: #475569;
    }

    .completeBtn.hidden {
      display: none;
    }

    .result {
      margin-top: 13px;
      font-size: 15px;
      font-weight: 850;
      min-height: 22px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-line;
    }

    .result.success {
      color: #166534;
    }

    .result.error {
      color: #991b1b;
    }

    .repairBlockedBox {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.5;
    }

    .repairBlockedTitle {
      font-size: 17px;
      font-weight: 950;
      color: #991b1b;
      margin-bottom: 6px;
    }

    .repairBlockedText {
      font-size: 14px;
      font-weight: 850;
      color: #64748b;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .systemBtn {
      display: block;
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 0 auto 14px;
      padding: 15px 16px;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      background: #e2e8f0;
      color: #0f172a;
    }

    .systemBtn:active {
      transform: translateY(1px);
    }

    .hint {
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 420px) {
      .topCard {
        min-height: 100dvh;
        padding: 16px 20px 22px;
      }

      .topCardInner {
        min-height: calc(100dvh - 38px);
      }

      .topNav {
        margin-bottom: 16px;
      }

      .heroArea {
        min-height: 300px;
        margin-bottom: 18px;
      }

      .metricValue {
        font-size: 106px;
      }

      .metricValue.personalCode {
        font-size: 58px;
      }

      .metricValue .unit {
        font-size: 30px;
      }

      .poundMetric {
        top: 146px;
      }

      .heroSubInfo {
        top: 70px;
      }

      .ticketCard {
        border-radius: 22px;
        padding: 17px;
      }

      .ticketTop {
        margin-bottom: 14px;
      }

      .ticketMain {
        font-size: 24px;
      }

      .ticketGrid {
        gap: 12px 16px;
      }

      .ticketValue {
        font-size: 16px;
      }

      .section {
        width: calc(100% - 20px);
        border-radius: 22px;
        padding: 18px;
      }

      .systemBtn,
      .hint {
        width: calc(100% - 20px);
      }
    }

    @media (max-height: 700px) {
      .topCard {
        padding-top: 14px;
        padding-bottom: 18px;
      }

      .topCardInner {
        min-height: calc(100dvh - 32px);
      }

      .topNav {
        margin-bottom: 12px;
      }

      .heroArea {
        min-height: 236px;
        margin-bottom: 14px;
      }

      .metricLabel {
        font-size: 12px;
        margin-bottom: 3px;
      }

      .metricValue {
        font-size: 78px;
      }

      .metricValue.personalCode {
        font-size: 42px;
      }

      .metricValue .unit {
        font-size: 22px;
      }

      .poundMetric {
        top: 112px;
      }

      .heroSubInfo {
        top: 52px;
        font-size: 11px;
      }

      .ticketCard {
        padding: 14px;
        border-radius: 20px;
      }

      .ticketTop {
        margin-bottom: 10px;
      }

      .ticketMain {
        font-size: 21px;
      }

      .ticketGrid {
        gap: 8px 12px;
        margin-bottom: 8px;
      }

      .ticketLabel {
        font-size: 9px;
        margin-bottom: 2px;
      }

      .ticketValue {
        font-size: 14px;
        line-height: 1.15;
      }

      .ticketNoticeRow {
        margin-top: 10px;
        padding-top: 10px;
      }

      .badge,
      .repairNotice {
        min-height: 28px;
        font-size: 12px;
        padding: 6px 10px;
      }

      .scrollHint {
        margin-top: 8px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .loadingLogoWrap {
        background: #0b1020;
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .topCard {
        background: #f8fafc;
        color: #030712;
      }

      .navTitle,
      .metricValue {
        color: #030712;
      }

      .navType {
        background: #e5e7eb;
        color: #111827;
      }

      .ticketCard {
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.18);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .sectionTitle {
        color: #f8fafc;
      }

      .repairBlockedBox {
        background: #172033;
        border: none;
      }

      .repairBlockedTitle {
        color: #fca5a5;
      }

      .repairBlockedText {
        color: #94a3b8;
      }

      textarea {
        background: #172033;
        color: #f8fafc;
        border: none;
        box-shadow: none;
      }

      textarea:focus {
        border: none;
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.14);
      }

      #repairRequest {
        color: #f8fafc;
      }

      #repairRequest::placeholder {
        color: #7b8798;
      }

      button {
        background: #334155;
        box-shadow: none;
      }

      button:active {
        background: #475569;
      }

      .completeBtn {
        background: #263449;
      }

      .completeBtn:active {
        background: #334155;
      }

      .result,
      .hint {
        color: #94a3b8;
      }

      .result.success {
        color: #86efac;
      }

      .result.error {
        color: #fca5a5;
      }

      .systemBtn {
        background: #1e293b;
        color: #f8fafc;
      }

      .errorBox {
        background: #24130b;
        color: #fed7aa;
        border-color: rgba(249, 115, 22, 0.35);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .errorBox::before {
        background: #fb923c;
      }

      .errorIcon {
        background: rgba(251, 146, 60, 0.16);
        color: #fdba74;
      }

      .errorMessage {
        color: #fed7aa;
      }

      .errorAction {
        color: #fdba74;
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentItem = null;
    let currentMode = "bow";
    let currentKey = "";

    init();

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);

        currentMode = getMode(params);
        currentKey =
          params.get("id") ||
          params.get("c") ||
          params.get("code") ||
          params.get("serial") ||
          "";

        if (!currentKey) {
          showError("조회 코드가 없습니다.");
          return;
        }

        const apiUrl = buildApiUrl(currentMode, currentKey);
        const response = await fetch(apiUrl);

        if (!response.ok) {
          showError("장비 정보를 찾을 수 없습니다.");
          return;
        }

        currentItem = await response.json();
        renderPage(currentItem);
      } catch (error) {
        showError("장비 정보를 불러오지 못했습니다.");
      }
    }

    function getMode(params) {
      const raw = String(
        params.get("t") ||
        params.get("type") ||
        params.get("mode") ||
        "bow"
      ).trim().toLowerCase();

      if (raw === "p" || raw === "personal" || raw === "item" || raw === "private") {
        return "personal";
      }

      return "bow";
    }

    function buildApiUrl(mode, key) {
      if (mode === "personal") {
        return "/api/bow?t=p&c=" + encodeURIComponent(key);
      }

      return "/api/bow?id=" + encodeURIComponent(key);
    }

    function renderPage(item) {
      const isPersonal = item.mode === "personal";
      const status = item.status || "-";
      const badgeClass = getBadgeClass(status);
      const ticketClass = getTicketClass(status);

      const isRepairNeeded = status === "수리 필요";
      const isBadStatus = status === "불량";
      const isDeletedStatus = status === "말소";
      const isRepairBlocked = isBadStatus || isDeletedStatus;

      const noticeText = isBadStatus
        ? "사용 금지"
        : isRepairNeeded
          ? "사용 전 확인 필요"
          : "";

      const typeLabel = isPersonal ? "개인 장비" : "공용 장비";
      const primaryLabel = isPersonal ? "식별 코드" : "일련번호";
      const primaryValue = isPersonal ? item.code : item.serial;
      const primaryClass = isPersonal ? "personalCode" : "";
      const poundValue = item.pound || "-";

      const brandText = item.brand || "-";
      const sizeText = item.size || "-";
      const checkText = item.check || "-";

      document.title = isPersonal
        ? `${item.code || ""} 장비`
        : `${item.serial || ""}번 활`;

      app.innerHTML = `
        <div class="topCard">
          <div class="topCardInner">
            <div class="topNav">
              <div class="navLeft">
                <div class="backMark">‹</div>
                <div class="navTitle">SNU Korean Archery</div>
              </div>

              <div class="navType">${escapeHtml(typeLabel)}</div>
            </div>

            <div class="heroArea">
              <div class="heroMetric serialMetric">
                <div class="metricLabel">${escapeHtml(primaryLabel)}</div>
                <div class="metricValue ${primaryClass}">
                  ${escapeHtml(primaryValue || "-")}
                </div>
              </div>

              <div class="heroSubInfo">
                ${escapeHtml(typeLabel)}<br>
                ${escapeHtml(status)}
              </div>

              <div class="heroMetric poundMetric">
                <div class="metricLabel">파운드</div>
                <div class="metricValue">
                  ${escapeHtml(poundValue)}<span class="unit">lb</span>
                </div>
              </div>
            </div>

            <div class="ticketCard ${ticketClass}">
              <div class="ticketTop">
                <div>
                  <div class="ticketLabel">${isPersonal ? "Owner" : "Brand"}</div>
                  <div class="ticketMain">
                    ${escapeHtml(isPersonal ? (item.owner || "-") : brandText)}
                  </div>
                </div>

                <div class="ticketStatus">
                  <div class="ticketLabel">Status</div>
                  <div id="statusView" class="ticketMain">
                    ${escapeHtml(status)}
                  </div>
                </div>
              </div>

              <div class="ticketGrid">
                ${
                  isPersonal
                    ? `
                      ${ticketItem("Code", item.code)}
                      ${ticketItem("Pound", item.pound ? item.pound + " lb" : "-")}
                      ${ticketItem("Brand", item.brand)}
                      ${ticketItem("Size", item.size)}
                    `
                    : `
                      ${ticketItem("Serial", item.serial)}
                      ${ticketItem("Pound", item.pound ? item.pound + " lb" : "-")}
                      ${ticketItem("Size", item.size)}
                      ${ticketItem("Etc", item.etc)}
                    `
                }

                ${ticketItem("Check", checkText, true)}
              </div>

              <div class="ticketNoticeRow">
                <div id="statusBadge" class="badge ${badgeClass}">
                  ${escapeHtml(status)}
                </div>

                <div id="repairNotice" class="repairNotice ${isRepairNeeded || isBadStatus ? "" : "hidden"} ${isBadStatus ? "banNotice" : ""}">
                  ${escapeHtml(noticeText)}
                </div>
              </div>
            </div>

            <div class="scrollHint">
              아래로 스크롤하여 수리 요청
            </div>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">수리 요청</div>

          ${
            isRepairBlocked
              ? `
                <div class="repairBlockedBox">
                  <div class="repairBlockedTitle">
                    수리 요청을 할 수 없습니다
                  </div>
                  <div class="repairBlockedText">
                    이 장비는 ${escapeHtml(status)} 상태입니다.<br>
                    사용하거나 수리 요청하지 말고 담당자에게 문의하세요.
                  </div>
                </div>
              `
              : `
                <textarea id="repairRequest" placeholder="수리가 필요한 내용을 입력하세요."></textarea>

                <button id="saveBtn" onclick="submitRepairRequest()">제출</button>
                <button id="completeBtn" class="completeBtn ${isRepairNeeded ? "" : "hidden"}" onclick="completeRepair()">수리 완료</button>

                <div id="result" class="result"></div>
              `
          }
        </div>

        <a class="systemBtn" href="/dashboard.html">
          공용 장비 현황
        </a>

        <div class="hint">
          서울대학교 국궁부 ${isPersonal ? "개인 장비" : "공용 장비"} 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function ticketItem(label, value, full = false) {
      return `
        <div class="ticketItem ${full ? "full" : ""}">
          <div class="ticketLabel">${escapeHtml(label)}</div>
          <div ${label === "Check" ? `id="checkView"` : ""} class="ticketValue">
            ${escapeHtml(value || "-")}
          </div>
        </div>
      `;
    }

    async function submitRepairRequest() {
      if (currentItem?.status === "불량" || currentItem?.status === "말소") {
        return;
      }

      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "수리 필요";
      const check = textarea.value.trim();

      result.className = "result";

      if (!check) {
        result.textContent = "수리 요청 내용을 입력해주세요.";
        result.classList.add("error");
        return;
      }

      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "제출 중...";

      try {
        await saveStatusAndCheck(status, check, "제출 실패");

        textarea.value = "";
        result.textContent = "수리 요청이 접수되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "제출 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function completeRepair() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "정상";
      const check = formatDate(new Date());

      result.className = "result";
      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "처리 중...";

      try {
        await saveStatusAndCheck(status, check, "수리 완료 처리 실패");

        if (textarea) textarea.value = "";
        result.textContent = `수리 완료 처리되었습니다.\n점검 내역에 ${check} 날짜가 기록되었습니다.`;
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "수리 완료 처리 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function saveStatusAndCheck(status, check, fallbackMessage) {
      const body = {
        type: currentMode,
        status,
        check
      };

      if (currentMode === "personal") {
        body.code = currentKey;
      } else {
        body.id = currentKey;
      }

      const response = await fetch("/api/bow", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(data?.message || data?.error || fallbackMessage);
      }

      return data;
    }

    function updatePageAfterSave(status, check) {
      if (currentItem) {
        currentItem.status = status;
        currentItem.check = check;
      }

      const ticketCard = document.querySelector(".ticketCard");
      if (ticketCard) {
        ticketCard.classList.remove("ticket-normal", "ticket-repair", "ticket-bad", "ticket-deleted");
        ticketCard.classList.add(getTicketClass(status));
      }

      const badge = document.getElementById("statusBadge");
      if (badge) {
        badge.textContent = status || "-";
        badge.className = "badge " + getBadgeClass(status);
      }

      const statusView = document.getElementById("statusView");
      if (statusView) {
        statusView.textContent = status || "-";
      }

      const checkView = document.getElementById("checkView");
      if (checkView) {
        checkView.textContent = check || "-";
      }

      const heroSubInfo = document.querySelector(".heroSubInfo");
      if (heroSubInfo) {
        heroSubInfo.innerHTML = `${escapeHtml(currentItem?.mode === "personal" ? "개인 장비" : "공용 장비")}<br>${escapeHtml(status || "-")}`;
      }

      const repairNotice = document.getElementById("repairNotice");
      if (repairNotice) {
        repairNotice.classList.remove("banNotice");

        if (status === "수리 필요") {
          repairNotice.textContent = "사용 전 확인 필요";
          repairNotice.classList.remove("hidden");
        } else if (status === "불량") {
          repairNotice.textContent = "사용 금지";
          repairNotice.classList.add("banNotice");
          repairNotice.classList.remove("hidden");
        } else {
          repairNotice.textContent = "";
          repairNotice.classList.add("hidden");
        }
      }

      const completeBtn = document.getElementById("completeBtn");
      if (completeBtn) {
        if (status === "수리 필요") {
          completeBtn.classList.remove("hidden");
        } else {
          completeBtn.classList.add("hidden");
        }
      }
    }

    function getBadgeClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function getTicketClass(status) {
      if (status === "수리 필요") return "ticket-repair";
      if (status === "불량") return "ticket-bad";
      if (status === "말소") return "ticket-deleted";
      return "ticket-normal";
    }

    function formatDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          <div class="errorTitle">
            <span class="errorIcon">!</span>
            장비를 찾을 수 없습니다
          </div>

          <div class="errorMessage">
            해당 일련번호 또는 식별코드의 장비가 등록되어 있지 않습니다.
          </div>

          <div class="errorAction">
            번호를 확인한 뒤 다시 조회해주세요.
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>

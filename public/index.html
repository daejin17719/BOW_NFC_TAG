<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 장비 정보</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --text: #020617;
      --muted: rgba(2, 6, 23, 0.58);
      --line: #020617;

      --normal-card: #2ddc83;
      --repair-card: #f87171;
      --bad-card: #facc15;
      --deleted-card: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -0.05em;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .loadingLogoWrap {
      min-height: calc(100dvh - 20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .errorBox {
      position: relative;
      overflow: hidden;
      background: #fff7ed;
      color: #7c2d12;
      border: 1px solid #fed7aa;
      border-radius: 24px;
      padding: 22px 22px 20px;
      box-shadow: 0 10px 28px rgba(124, 45, 18, 0.10);
      font-weight: 850;
      line-height: 1.5;
    }

    .errorBox::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: #f97316;
    }

    .errorTitle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .errorIcon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffedd5;
      color: #c2410c;
      font-size: 16px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .errorMessage {
      font-size: 15px;
      font-weight: 850;
      color: #9a3412;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .errorAction {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 850;
      color: #c2410c;
    }

    .topCard {
      position: relative;
      width: 100%;
      min-height: calc(100dvh - 20px);
      padding: 52px 88px 36px 30px;
      border: 1.5px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: none;
    }

    .statusRail {
      position: absolute;
      top: 0;
      right: 0;
      width: 68px;
      height: 100%;
      border-left: 1.5px solid var(--line);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 42px;
    }

    .statusRail.normal {
      background: var(--normal-card);
    }

    .statusRail.repair {
      background: var(--repair-card);
    }

    .statusRail.bad {
      background: var(--bad-card);
    }

    .statusRail.deleted {
      background: var(--deleted-card);
    }

    .statusText {
      color: #ffffff;
      font-size: 31px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.1em;
      writing-mode: vertical-rl;
      text-orientation: upright;
      white-space: nowrap;
    }

    .statusRail.bad .statusText,
    .statusRail.deleted .statusText {
      color: #020617;
    }

    .heroNumber {
      margin: 0;
      font-size: 112px;
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.09em;
      color: #000000;
    }

    .infoGridIntegrated {
      margin-top: 118px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 34px;
      row-gap: 34px;
    }

    .infoItem {
      min-width: 0;
    }

    .infoItem.full {
      grid-column: 1 / -1;
    }

    .infoLabel {
      margin-bottom: 12px;
      font-size: 29px;
      font-weight: 400;
      line-height: 1;
      color: #020617;
      letter-spacing: -0.08em;
    }

    .infoValue {
      font-size: 39px;
      font-weight: 400;
      line-height: 1.08;
      color: #020617;
      word-break: keep-all;
      overflow-wrap: anywhere;
      letter-spacing: -0.08em;
    }

    .infoValue.large {
      font-size: 43px;
    }

    .infoValue.check {
      font-size: 40px;
      letter-spacing: -0.075em;
    }

    .scrollHint {
      margin-top: auto;
      padding-top: 34px;
      text-align: center;
      font-size: 16px;
      font-weight: 400;
      color: #020617;
      letter-spacing: -0.06em;
    }

    .repairSection {
      position: relative;
      margin-top: 14px;
      padding: 30px 24px 26px;
      border: 1.5px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      color: #020617;
      overflow: hidden;
    }

    .repairSection::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 26px;
      height: 100%;
      border-left: 1.5px solid var(--line);
    }

    .repairSection.normal::after {
      background: var(--normal-card);
    }

    .repairSection.repair::after {
      background: var(--repair-card);
    }

    .repairSection.bad::after {
      background: var(--bad-card);
    }

    .repairSection.deleted::after {
      background: var(--deleted-card);
    }

    .repairTitle {
      margin: 0 0 22px;
      font-size: 56px;
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.085em;
    }

    .repairGuide {
      margin: 0 34px 18px 0;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.45;
      word-break: keep-all;
      color: #020617;
    }

    textarea {
      width: calc(100% - 34px);
      min-height: 122px;
      resize: vertical;
      padding: 15px;
      border: 1.5px solid #0f172a;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: #020617;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.45;
    }

    #repairRequest {
      font-size: 16px;
      color: #020617;
    }

    #repairRequest::placeholder {
      color: rgba(2, 6, 23, 0.55);
      font-weight: 400;
    }

    button {
      width: calc(100% - 34px);
      height: 48px;
      margin-top: 14px;
      border: 1.5px solid #0f172a;
      border-radius: 0;
      background: #020617;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      box-shadow: none;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .completeBtn {
      margin-top: 10px;
      background: transparent;
      color: #020617;
    }

    .completeBtn.hidden {
      display: none;
    }

    .result {
      width: calc(100% - 34px);
      margin-top: 13px;
      font-size: 15px;
      font-weight: 700;
      min-height: 22px;
      color: rgba(2, 6, 23, 0.68);
      line-height: 1.5;
      white-space: pre-line;
    }

    .result.success {
      color: #14532d;
    }

    .result.error {
      color: #7f1d1d;
    }

    .repairBlockedBox {
      width: calc(100% - 34px);
      border: 1.5px solid #0f172a;
      padding: 16px;
      line-height: 1.5;
      background: transparent;
    }

    .repairBlockedTitle {
      font-size: 18px;
      font-weight: 900;
      color: #7f1d1d;
      margin-bottom: 6px;
    }

    .repairBlockedText {
      font-size: 14px;
      font-weight: 750;
      color: rgba(2, 6, 23, 0.72);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .systemBtn {
      display: block;
      width: 100%;
      margin: 14px 0;
      padding: 15px 16px;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      background: #1e293b;
      color: #ffffff;
      letter-spacing: -0.04em;
    }

    .systemBtn:active {
      transform: translateY(1px);
    }

    .hint {
      margin-top: 12px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      letter-spacing: -0.03em;
    }

    @media (max-width: 420px) {
      .topCard {
        padding: 50px 82px 34px 29px;
      }

      .statusRail {
        width: 66px;
      }

      .heroNumber {
        font-size: 108px;
      }

      .infoGridIntegrated {
        margin-top: 112px;
        column-gap: 30px;
        row-gap: 34px;
      }

      .infoLabel {
        font-size: 28px;
      }

      .infoValue {
        font-size: 38px;
      }

      .infoValue.large {
        font-size: 42px;
      }

      .infoValue.check {
        font-size: 39px;
      }
    }

    @media (max-width: 370px) {
      body {
        padding: 8px;
      }

      .topCard {
        min-height: calc(100dvh - 16px);
        padding: 44px 72px 30px 26px;
      }

      .statusRail {
        width: 58px;
      }

      .statusText {
        font-size: 27px;
      }

      .heroNumber {
        font-size: 94px;
      }

      .infoGridIntegrated {
        margin-top: 86px;
        column-gap: 24px;
        row-gap: 28px;
      }

      .infoLabel {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .infoValue {
        font-size: 33px;
      }

      .infoValue.large {
        font-size: 36px;
      }

      .infoValue.check {
        font-size: 32px;
      }

      .repairTitle {
        font-size: 48px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
      }

      body {
        background: #0b1020;
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .systemBtn {
        background: #1e293b;
        color: #f8fafc;
      }

      .hint {
        color: #94a3b8;
      }

      .errorBox {
        background: #24130b;
        color: #fed7aa;
        border-color: rgba(249, 115, 22, 0.35);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .errorBox::before {
        background: #fb923c;
      }

      .errorIcon {
        background: rgba(251, 146, 60, 0.16);
        color: #fdba74;
      }

      .errorMessage {
        color: #fed7aa;
      }

      .errorAction {
        color: #fdba74;
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentItem = null;
    let currentMode = "bow";
    let currentKey = "";

    init();

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);

        currentMode = getMode(params);
        currentKey =
          params.get("id") ||
          params.get("c") ||
          params.get("code") ||
          params.get("serial") ||
          "";

        if (!currentKey) {
          showError("조회 코드가 없습니다.");
          return;
        }

        const apiUrl = buildApiUrl(currentMode, currentKey);
        const response = await fetch(apiUrl);

        if (!response.ok) {
          showError("장비 정보를 찾을 수 없습니다.");
          return;
        }

        currentItem = await response.json();
        renderPage(currentItem);
      } catch (error) {
        showError("장비 정보를 불러오지 못했습니다.");
      }
    }

    function getMode(params) {
      const raw = String(
        params.get("t") ||
        params.get("type") ||
        params.get("mode") ||
        "bow"
      ).trim().toLowerCase();

      if (raw === "p" || raw === "personal" || raw === "item" || raw === "private") {
        return "personal";
      }

      return "bow";
    }

    function buildApiUrl(mode, key) {
      if (mode === "personal") {
        return "/api/bow?t=p&c=" + encodeURIComponent(key);
      }

      return "/api/bow?id=" + encodeURIComponent(key);
    }

    function renderPage(item) {
      const isPersonal = item.mode === "personal";
      const status = item.status || "-";
      const cardClass = getCardClass(status);

      const isRepairNeeded = status === "수리 필요";
      const isBadStatus = status === "불량";
      const isDeletedStatus = status === "말소";
      const isRepairBlocked = isBadStatus || isDeletedStatus;

      const typeLabel = isPersonal ? "개인 장비" : "공용 장비";

      const mainNumber = isPersonal
        ? item.code || item.serial || "-"
        : item.serial || "-";

      document.title = isPersonal
        ? `${item.code || ""} 장비`
        : `${item.serial || ""}번 활`;

      app.innerHTML = `
        <div id="topCard" class="topCard">
          <div id="statusRail" class="statusRail ${cardClass}">
            <div id="statusBadge" class="statusText">
              ${escapeHtml(status)}
            </div>
          </div>

          <h1 class="heroNumber" id="heroSerial">
            ${escapeHtml(mainNumber)}
          </h1>

          <div class="infoGridIntegrated">
            ${renderIntegratedInfo(item, typeLabel)}
          </div>

          <div class="scrollHint">아래로 스크롤해 수리 요청</div>
        </div>

        <div id="repairSection" class="repairSection ${cardClass}">
          <h2 class="repairTitle">Repair</h2>

          ${
            isRepairBlocked
              ? `
                <div class="repairBlockedBox">
                  <div class="repairBlockedTitle">
                    수리 요청을 할 수 없습니다
                  </div>
                  <div class="repairBlockedText">
                    이 장비는 ${escapeHtml(status)} 상태입니다.<br>
                    사용하거나 수리 요청하지 말고 담당자에게 문의하세요.
                  </div>
                </div>
              `
              : `
                <p class="repairGuide">
                  장비에 문제가 있거나 점검이 필요한 경우 아래에 내용을 적어 제출하세요.
                </p>

                <textarea id="repairRequest" placeholder="수리가 필요한 내용을 입력하세요."></textarea>

                <button id="saveBtn" onclick="submitRepairRequest()">제출</button>
                <button id="completeBtn" class="completeBtn ${isRepairNeeded ? "" : "hidden"}" onclick="completeRepair()">수리 완료</button>

                <div id="result" class="result"></div>
              `
          }
        </div>

        <a class="systemBtn" href="/dashboard.html">
          공용 장비 현황
        </a>

        <div class="hint">
          서울대학교 국궁부 ${isPersonal ? "개인 장비" : "공용 장비"} 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function renderIntegratedInfo(item, typeLabel) {
      if (item.mode === "personal") {
        return `
          ${detailBlock("파운드", item.pound ? item.pound + "lb" : "-")}
          ${detailBlock("기타", typeLabel)}
          ${detailBlock("브랜드", item.brand, true)}
          ${detailBlock("사이즈", item.size, true)}
          ${detailBlock("소유자", item.owner, false, "", true)}
          ${detailBlock("점검내역", item.check || "-", false, "checkView", true, true)}
        `;
      }

      return `
        ${detailBlock("파운드", item.pound ? item.pound + "lb" : "-")}
        ${detailBlock("기타", item.etc)}
        ${detailBlock("브랜드", item.brand, true)}
        ${detailBlock("사이즈", item.size, true)}
        ${detailBlock("점검내역", item.check || "-", false, "checkView", true, true)}
      `;
    }

    function detailBlock(label, value, large = false, id = "", full = false, check = false) {
      return `
        <div class="infoItem ${full ? "full" : ""}">
          <div class="infoLabel">${escapeHtml(label)}</div>
          <div ${id ? `id="${id}"` : ""} class="infoValue ${large ? "large" : ""} ${check ? "check" : ""}">
            ${escapeHtml(value || "-")}
          </div>
        </div>
      `;
    }

    async function submitRepairRequest() {
      if (currentItem?.status === "불량" || currentItem?.status === "말소") {
        return;
      }

      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "수리 필요";
      const check = textarea.value.trim();

      result.className = "result";

      if (!check) {
        result.textContent = "수리 요청 내용을 입력해주세요.";
        result.classList.add("error");
        return;
      }

      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "제출 중...";

      try {
        await saveStatusAndCheck(status, check, "제출 실패");

        textarea.value = "";
        result.textContent = "수리 요청이 접수되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "제출 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function completeRepair() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "정상";
      const check = formatDate(new Date());

      result.className = "result";
      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "처리 중...";

      try {
        await saveStatusAndCheck(status, check, "수리 완료 처리 실패");

        if (textarea) textarea.value = "";
        result.textContent = `수리 완료 처리되었습니다.\n점검 내역에 ${check} 날짜가 기록되었습니다.`;
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "수리 완료 처리 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function saveStatusAndCheck(status, check, fallbackMessage) {
      const body = {
        type: currentMode,
        status,
        check
      };

      if (currentMode === "personal") {
        body.code = currentKey;
      } else {
        body.id = currentKey;
      }

      const response = await fetch("/api/bow", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(data?.message || data?.error || fallbackMessage);
      }

      return data;
    }

    function updatePageAfterSave(status, check) {
      if (currentItem) {
        currentItem.status = status;
        currentItem.check = check;
      }

      const cardClass = getCardClass(status);

      const statusRail = document.getElementById("statusRail");
      if (statusRail) {
        statusRail.className = "statusRail " + cardClass;
      }

      const repairSection = document.getElementById("repairSection");
      if (repairSection) {
        repairSection.className = "repairSection " + cardClass;
      }

      const badge = document.getElementById("statusBadge");
      if (badge) {
        badge.textContent = status || "-";
        badge.className = "statusText";
      }

      const checkView = document.getElementById("checkView");
      if (checkView) {
        checkView.textContent = check || "-";
      }

      const completeBtn = document.getElementById("completeBtn");
      if (completeBtn) {
        if (status === "수리 필요") {
          completeBtn.classList.remove("hidden");
        } else {
          completeBtn.classList.add("hidden");
        }
      }
    }

    function getCardClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function getBadgeClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function formatDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          <div class="errorTitle">
            <span class="errorIcon">!</span>
            장비를 찾을 수 없습니다
          </div>

          <div class="errorMessage">
            해당 일련번호 또는 식별코드의 장비가 등록되어 있지 않습니다.
          </div>

          <div class="errorAction">
            번호를 확인한 뒤 다시 조회해주세요.
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeTextarea(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>

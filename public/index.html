<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 장비 정보</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background:
        radial-gradient(circle at top left, #e0f2fe 0, transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 28px;
    }

    .loading,
    .errorBox {
      background: white;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      font-weight: 850;
      line-height: 1.5;
    }

    .loadingLogoWrap {
      min-height: calc(100dvh - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .errorBox {
      color: #991b1b;
      background: #fff7f7;
      border: 1px solid #fecaca;
    }

    .topCard {
      position: relative;
      overflow: hidden;
      min-height: 210px;
      background: linear-gradient(135deg, #121c2d 0%, #2d3e54 100%);
      color: white;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.22);
      margin-bottom: 14px;
    }

    .mainBlock,
    .titleLine,
    .badge,
    .repairNotice {
      position: relative;
      z-index: 2;
    }

    .mainBlock {
      margin-bottom: 22px;
    }

    .smallLabel {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
    }

    .mainValue {
      line-height: 1.05;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .mainValue.ownerValue {
      font-size: 35px;
      font-weight: 900;
      letter-spacing: -0.045em;
      max-width: 68%;
    }

    .mainValue.serialValue {
      font-size: 50px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .titleLine {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 28px;
      width: 100%;
    }

    .title {
      font-size: 34px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      word-break: keep-all;
      min-width: 0;
    }

    .topPound {
      flex: 0 0 auto;
      font-size: 36px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      white-space: nowrap;
      color: rgba(255,255,255,0.96);
      margin-left: auto;
    }

    .topPoundUnit {
      font-size: 20px;
      font-weight: 850;
      color: rgba(255,255,255,0.78);
      margin-left: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 15px;
    }

    .badge.normal {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .badge.repair {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .badge.bad {
      background: var(--yellow-bg);
      color: var(--yellow-text);
    }

    .badge.deleted {
      background: var(--gray-bg);
      color: var(--gray-text);
    }

    .statusRow {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .repairNotice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.92);
    }

    .repairNotice.hidden {
      display: none;
    }

    .banNotice {
      background: rgba(127, 29, 29, 0.12);
      color: #991b1b;
    }

    .section {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 14px;
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .infoGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .miniCard {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 14px;
      min-height: 82px;
    }

    .miniLabel {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .miniValue {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -0.03em;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .miniValue.small {
      font-size: 18px;
      line-height: 1.35;
    }

    .fullItem {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 15px;
      margin-top: 10px;
    }

    .fullLabel {
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .fullValue {
      font-size: 18px;
      font-weight: 850;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      font-weight: 850;
      margin: 14px 0 7px;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    #repairRequest {
      font-size: 17px;
      color: var(--text);
    }

    #repairRequest::placeholder {
      font-size: 16px;
      color: #7b8798;
      font-weight: 500;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .completeBtn {
      margin-top: 10px;
      background: #475569;
    }

    .completeBtn.hidden {
      display: none;
    }

    .result {
      margin-top: 13px;
      font-size: 15px;
      font-weight: 850;
      min-height: 22px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-line;
    }

    .result.success {
      color: #166534;
    }

    .result.error {
      color: #991b1b;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .topCard {
        min-height: 170px;
        border-radius: 24px;
        padding: 24px 26px;
      }

      .mainValue.ownerValue {
        font-size: 31px;
        max-width: 68%;
      }

      .mainValue.serialValue {
        font-size: 48px;
      }

      .titleLine {
        gap: 18px;
        margin-bottom: 26px;
      }

      .title {
        font-size: 32px;
      }

      .topPound {
        font-size: 34px;
      }

      .topPoundUnit {
        font-size: 19px;
      }

      .section {
        border-radius: 22px;
        padding: 18px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;

        --green-bg: #dcfce7;
        --green-text: #166534;

        --red-bg: #fee2e2;
        --red-text: #991b1b;

        --yellow-bg: #fef3c7;
        --yellow-text: #92400e;

        --gray-bg: #334155;
        --gray-text: #e2e8f0;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .miniCard,
      .fullItem {
        background: #172033;
        border: none;
      }

      .miniLabel,
      .fullLabel,
      label {
        color: #9aa8bc;
      }

      .miniValue,
      .fullValue,
      .sectionTitle {
        color: #f8fafc;
      }

      select,
      textarea {
        background: #172033;
        color: #f8fafc;
        border: none;
        box-shadow: none;
      }

      select:focus,
      textarea:focus {
        border: none;
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.14);
      }

      #repairRequest {
        color: #f8fafc;
      }

      #repairRequest::placeholder {
        color: #7b8798;
      }

      button {
        background: #334155;
        box-shadow: none;
      }

      button:active {
        background: #475569;
      }

      .completeBtn {
        background: #263449;
      }

      .completeBtn:active {
        background: #334155;
      }

      .result,
      .hint {
        color: #94a3b8;
      }

      .result.success {
        color: #86efac;
      }

      .result.error {
        color: #fca5a5;
      }

      .loading,
      .errorBox {
        background: #111827;
        color: #f8fafc;
        border: 1px solid #1e293b;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .errorBox {
        background: #2b1111;
        color: #fecaca;
        border-color: #7f1d1d;
      }

      .topCard {
        background: linear-gradient(
      135deg,
      rgba(248, 250, 252, 0.90) 0%,
      rgba(232, 241, 251, 0.90) 100%
    );
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
        color: #0f172a;
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.28);
      }

      .smallLabel {
        color: rgba(15, 23, 42, 0.62);
      }

      .title,
      .mainValue,
      .topPound {
        color: #0b1220;
      }

      .topPoundUnit {
        color: rgba(15, 23, 42, 0.58);
      }

      .repairNotice {
        background: rgba(15, 23, 42, 0.08);
        color: #991b1b;
      }

      .banNotice {
        background: rgba(127, 29, 29, 0.13);
        color: #7f1d1d;
      }

      .topCard .badge {
        border: none;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
      }

      .topCard .badge.normal {
        background: #bbf7d0;
        color: #14532d;
      }

      .topCard .badge.repair {
        background: #fecaca;
        color: #991b1b;
      }

      .topCard .badge.bad {
        background: #fde68a;
        color: #78350f;
      }

      .topCard .badge.deleted {
        background: #cbd5e1;
        color: #1e293b;
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentItem = null;
    let currentMode = "bow";
    let currentKey = "";

    init();

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);

        currentMode = getMode(params);
        currentKey =
          params.get("id") ||
          params.get("c") ||
          params.get("code") ||
          params.get("serial") ||
          "";

        if (!currentKey) {
          showError("조회 코드가 없습니다. URL 뒤에 ?id=3 또는 ?t=p&c=KDJ 처럼 붙여주세요.");
          return;
        }

        const apiUrl = buildApiUrl(currentMode, currentKey);
        const response = await fetch(apiUrl);

        if (!response.ok) {
          const error = await response.json().catch(() => null);
          showError(error?.message || error?.error || "장비 정보를 찾을 수 없습니다.");
          return;
        }

        currentItem = await response.json();
        renderPage(currentItem);
      } catch (error) {
        showError("불러오기 실패: " + error.message);
      }
    }

    function getMode(params) {
      const raw = String(
        params.get("t") ||
        params.get("type") ||
        params.get("mode") ||
        "bow"
      ).trim().toLowerCase();

      if (raw === "p" || raw === "personal" || raw === "item" || raw === "private") {
        return "personal";
      }

      return "bow";
    }

    function buildApiUrl(mode, key) {
      if (mode === "personal") {
        return "/api/bow?t=p&c=" + encodeURIComponent(key);
      }

      return "/api/bow?id=" + encodeURIComponent(key);
    }

    function renderPage(item) {
      const isPersonal = item.mode === "personal";
      const status = item.status || "-";
      const badgeClass = getBadgeClass(status);

      const isRepairNeeded = status === "수리 필요";
      const isBadStatus = status === "불량";
      const noticeText = isBadStatus
        ? "사용 금지"
        : isRepairNeeded
          ? "사용 전 확인 필요"
          : "";

      const mainLabel = isPersonal ? "소유자" : "일련번호";
      const mainValue = isPersonal ? item.owner : item.serial;
      const mainValueClass = isPersonal ? "ownerValue" : "serialValue";
      const sectionTitle = isPersonal ? "장비 정보" : "활 정보";

      const titleText = `${item.brand || "-"} ${item.size || ""}`.trim();
      const poundText = item.pound
        ? `${escapeHtml(item.pound)}<span class="topPoundUnit">lb</span>`
        : `-<span class="topPoundUnit">lb</span>`;

      document.title = isPersonal
        ? `${item.code || ""} 장비`
        : `${item.serial || ""}번 활`;

      app.innerHTML = `
        <div class="topCard">
          <div class="mainBlock">
            <div class="smallLabel">${mainLabel}</div>
            <div class="mainValue ${mainValueClass}">${escapeHtml(mainValue || "-")}</div>
          </div>

          <div class="titleLine">
            <div class="title">${escapeHtml(titleText)}</div>
            <div class="topPound">${poundText}</div>
          </div>

          <div class="statusRow">
            <div id="statusBadge" class="badge ${badgeClass}">
              ${escapeHtml(status)}
            </div>
            <div id="repairNotice" class="repairNotice ${isRepairNeeded || isBadStatus ? "" : "hidden"} ${isBadStatus ? "banNotice" : ""}">
              ${escapeHtml(noticeText)}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">${sectionTitle}</div>

          <div class="infoGrid">
            ${renderInfoCards(item)}
          </div>

          <div class="fullItem">
            <div class="fullLabel">점검 내역</div>
            <div id="checkView" class="fullValue">${escapeHtml(item.check || "-")}</div>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">수리 요청</div>

          <textarea id="repairRequest" placeholder="수리가 필요한 내용을 입력하세요."></textarea>

          <button id="saveBtn" onclick="submitRepairRequest()">제출</button>
          <button id="completeBtn" class="completeBtn ${isRepairNeeded ? "" : "hidden"}" onclick="completeRepair()">수리 완료</button>

          <div id="result" class="result"></div>
        </div>

        <div class="hint">
          서울대학교 국궁부 ${isPersonal ? "개인 장비" : "공용 장비"} 관리 시스템<br>
          Copyright © SNU_K_ARCHERY. All Rights Reserved.
        </div>
      `;
    }

    function renderInfoCards(item) {
      if (item.mode === "personal") {
        return `
          ${miniCard("식별 코드", item.code)}
          ${miniCard("소유자", item.owner)}
          ${miniCard("브랜드", item.brand)}
          ${miniCard("사이즈", item.size)}
          ${miniCard("파운드", item.pound ? item.pound + " lb" : "-")}
          ${miniCard("상태", item.status, true, "statusView")}
        `;
      }

      return `
        ${miniCard("일련번호", item.serial)}
        ${miniCard("상태", item.status, true, "statusView")}
        ${miniCard("브랜드", item.brand)}
        ${miniCard("사이즈", item.size)}
        ${miniCard("파운드", item.pound ? item.pound + " lb" : "-")}
        ${miniCard("기타", item.etc, true)}
      `;
    }

    function miniCard(label, value, small = false, id = "") {
      return `
        <div class="miniCard">
          <div class="miniLabel">${escapeHtml(label)}</div>
          <div ${id ? `id="${id}"` : ""} class="miniValue ${small ? "small" : ""}">
            ${escapeHtml(value || "-")}
          </div>
        </div>
      `;
    }

    async function submitRepairRequest() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "수리 필요";
      const check = textarea.value.trim();

      result.className = "result";

      if (!check) {
        result.textContent = "수리 요청 내용을 입력해주세요.";
        result.classList.add("error");
        return;
      }

      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "제출 중...";

      try {
        await saveStatusAndCheck(status, check, "제출 실패");

        textarea.value = "";
        result.textContent = "수리 요청이 접수되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "제출 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function completeRepair() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "정상";
      const check = "수리 완료";

      result.className = "result";
      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "처리 중...";

      try {
        await saveStatusAndCheck(status, check, "수리 완료 처리 실패");

        if (textarea) textarea.value = "";
        result.textContent = "수리 완료 처리되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "수리 완료 처리 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function saveStatusAndCheck(status, check, fallbackMessage) {
      const body = {
        type: currentMode,
        status,
        check
      };

      if (currentMode === "personal") {
        body.code = currentKey;
      } else {
        body.id = currentKey;
      }

      const response = await fetch("/api/bow", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(data?.message || data?.error || fallbackMessage);
      }

      return data;
    }

    function updatePageAfterSave(status, check) {
      const badge = document.getElementById("statusBadge");
      badge.textContent = status || "-";
      badge.className = "badge " + getBadgeClass(status);

      const statusView = document.getElementById("statusView");
      if (statusView) {
        statusView.textContent = status || "-";
      }

      const checkView = document.getElementById("checkView");
      if (checkView) {
        checkView.textContent = check || "-";
      }

      const repairNotice = document.getElementById("repairNotice");
      if (repairNotice) {
        repairNotice.classList.remove("banNotice");

        if (status === "수리 필요") {
          repairNotice.textContent = "사용 전 확인 필요";
          repairNotice.classList.remove("hidden");
        } else if (status === "불량") {
          repairNotice.textContent = "사용 금지";
          repairNotice.classList.add("banNotice");
          repairNotice.classList.remove("hidden");
        } else {
          repairNotice.textContent = "";
          repairNotice.classList.add("hidden");
        }
      }

      const completeBtn = document.getElementById("completeBtn");
      if (completeBtn) {
        if (status === "수리 필요") {
          completeBtn.classList.remove("hidden");
        } else {
          completeBtn.classList.add("hidden");
        }
      }
    }

    function getBadgeClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          ${escapeHtml(message)}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeTextarea(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>

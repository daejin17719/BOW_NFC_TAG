<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 장비 정보</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background:
        radial-gradient(circle at top left, #e0f2fe 0, transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 28px;
    }

    .loadingLogoWrap {
      min-height: calc(100dvh - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .errorBox {
      position: relative;
      overflow: hidden;
      background: #fff7ed;
      color: #7c2d12;
      border: 1px solid #fed7aa;
      border-radius: 24px;
      padding: 22px 22px 20px;
      box-shadow: 0 10px 28px rgba(124, 45, 18, 0.10);
      font-weight: 850;
      line-height: 1.5;
    }

    .errorBox::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: #f97316;
    }

    .errorTitle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .errorIcon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffedd5;
      color: #c2410c;
      font-size: 16px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .errorMessage {
      font-size: 15px;
      font-weight: 850;
      color: #9a3412;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .errorAction {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 850;
      color: #c2410c;
    }

    .topCard {
      position: relative;
      overflow: hidden;
      min-height: 210px;
      background: linear-gradient(135deg, #121c2d 0%, #2d3e54 100%);
      color: white;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.22);
      margin-bottom: 14px;
    }

    .mainBlock,
    .titleLine,
    .badge,
    .repairNotice {
      position: relative;
      z-index: 2;
    }

    .typeBadge {
      position: absolute;
      top: 15px;
      right: -38px;
      z-index: 3;
      width: 132px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(43deg);
      transform-origin: center;
      font-size: 12px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.02em;
      background: rgba(248, 250, 252, 0.96);
      color: rgba(15, 23, 42, 0.96);
      box-shadow: none;
      text-align: center;
    }

    .mainBlock {
      margin-bottom: 22px;
    }

    .smallLabel {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
    }

    .mainValue {
      line-height: 1.05;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .mainValue.ownerValue {
      font-size: 35px;
      font-weight: 900;
      letter-spacing: -0.045em;
      max-width: 68%;
    }

    .mainValue.serialValue {
      font-size: 50px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .titleLine {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 28px;
      width: 100%;
    }

    .title {
      font-size: 34px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      word-break: keep-all;
      min-width: 0;
    }

    .topPound {
      flex: 0 0 auto;
      font-size: 36px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      white-space: nowrap;
      color: rgba(255,255,255,0.96);
      margin-left: auto;
    }

    .topPoundUnit {
      font-size: 20px;
      font-weight: 850;
      color: rgba(255,255,255,0.78);
      margin-left: 2px;
    }

    .badge,
    .repairNotice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 15px;
      box-shadow: none;
    }

    .badge.normal {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .badge.repair {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .badge.bad {
      background: var(--yellow-bg);
      color: var(--yellow-text);
    }

    .badge.deleted {
      background: var(--gray-bg);
      color: var(--gray-text);
    }

    .statusRow {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .repairNotice {
      font-size: 14px;
      padding: 7px 13px;
      background: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.92);
    }

    .repairNotice.hidden {
      display: none;
    }

    .banNotice {
      background: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.92);
    }

    .section {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 14px;
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .infoGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .miniCard {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 14px;
      min-height: 82px;
    }

    .miniLabel {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .miniValue {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -0.03em;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .miniValue.small {
      font-size: 18px;
      line-height: 1.35;
    }

    .fullItem {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 15px;
      margin-top: 10px;
    }

    .fullLabel {
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .fullValue {
      font-size: 18px;
      font-weight: 850;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    #repairRequest {
      font-size: 17px;
      color: var(--text);
    }

    #repairRequest::placeholder {
      font-size: 16px;
      color: #7b8798;
      font-weight: 500;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .completeBtn {
      margin-top: 10px;
      background: #475569;
    }

    .completeBtn.hidden {
      display: none;
    }

    .result {
      margin-top: 13px;
      font-size: 15px;
      font-weight: 850;
      min-height: 22px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-line;
    }

    .result.success {
      color: #166534;
    }

    .result.error {
      color: #991b1b;
    }

    .repairBlockedBox {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.5;
    }

    .repairBlockedTitle {
      font-size: 17px;
      font-weight: 950;
      color: #991b1b;
      margin-bottom: 6px;
    }

    .repairBlockedText {
      font-size: 14px;
      font-weight: 850;
      color: #64748b;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .borrowLockedBox {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
    }

    .borrowLabel {
      font-size: 13px;
      color: var(--muted);
      font-weight: 850;
      margin-bottom: 6px;
    }

    .borrowName {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 950;
      letter-spacing: -0.045em;
      color: #1e40af;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .borrowLockedBadge {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 950;
      background: #e2e8f0;
      color: #475569;
      white-space: nowrap;
    }

    .borrowInputBox {
      display: flex;
      gap: 10px;
    }

    .borrowInput {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-weight: 850;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .borrowSaveBtn {
      flex: 0 0 auto;
      width: auto;
      margin-top: 0;
      border-radius: 16px;
      padding: 0 18px;
      font-size: 16px;
    }

    .borrowHelp {
      margin-top: 3px;
      font-size: 13px;
      font-weight: 850;
      color: var(--muted);
      line-height: 1.5;
    }

    .systemBtn {
      display: block;
      width: 100%;
      margin: 0 0 14px;
      padding: 15px 16px;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      background: #e2e8f0;
      color: #0f172a;
    }

    .systemBtn:active {
      transform: translateY(1px);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .topCard {
        min-height: 170px;
        border-radius: 24px;
        padding: 24px 26px;
      }

      .typeBadge {
        top: 14px;
        right: -40px;
        width: 136px;
        height: 30px;
        transform: rotate(43deg);
      }

      .mainValue.ownerValue {
        font-size: 31px;
        max-width: 68%;
      }

      .mainValue.serialValue {
        font-size: 48px;
      }

      .titleLine {
        gap: 18px;
        margin-bottom: 26px;
      }

      .title {
        font-size: 32px;
      }

      .topPound {
        font-size: 34px;
      }

      .topPoundUnit {
        font-size: 19px;
      }

      .section {
        border-radius: 22px;
        padding: 18px;
      }

      .borrowInputBox {
        gap: 8px;
      }

      .borrowName {
        font-size: 22px;
      }

      .borrowSaveBtn {
        padding: 0 16px;
      }

      .smallLabel,
      .mainValue,
      .mainValue.ownerValue,
      .mainValue.serialValue,
      .title,
      .topPound,
      .badge,
      .repairNotice,
      .typeBadge {
        font-weight: 900;
      }

      .topPoundUnit {
        font-weight: 850;
      }

      .sectionTitle,
      .miniValue,
      .miniValue.small,
      .fullValue,
      button {
        font-weight: 900;
      }

      .miniLabel,
      .fullLabel,
      textarea,
      .result,
      .hint,
      .repairBlockedText,
      .borrowHelp,
      .borrowLabel {
        font-weight: 850;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;

        --green-bg: #dcfce7;
        --green-text: #166534;

        --red-bg: #fee2e2;
        --red-text: #991b1b;

        --yellow-bg: #fef3c7;
        --yellow-text: #92400e;

        --gray-bg: #334155;
        --gray-text: #e2e8f0;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .miniCard,
      .fullItem,
      .repairBlockedBox,
      .borrowLockedBox {
        background: #172033;
        border: none;
      }

      .miniLabel,
      .fullLabel,
      .borrowLabel {
        color: #9aa8bc;
      }

      .miniValue,
      .fullValue,
      .sectionTitle {
        color: #f8fafc;
      }

      .repairBlockedTitle {
        color: #fca5a5;
      }

      .repairBlockedText {
        color: #94a3b8;
      }

      textarea,
      .borrowInput {
        background: #172033;
        color: #f8fafc;
        border: none;
        box-shadow: none;
      }

      textarea:focus,
      .borrowInput:focus {
        border: none;
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.14);
      }

      #repairRequest {
        color: #f8fafc;
      }

      #repairRequest::placeholder {
        color: #7b8798;
      }

      button {
        background: #334155;
        box-shadow: none;
      }

      button:active {
        background: #475569;
      }

      .completeBtn {
        background: #263449;
      }

      .completeBtn:active {
        background: #334155;
      }

      .result,
      .hint,
      .borrowHelp {
        color: #94a3b8;
      }

      .result.success {
        color: #86efac;
      }

      .result.error {
        color: #fca5a5;
      }

      .borrowName {
        color: #93c5fd;
      }

      .borrowLockedBadge {
        background: #263449;
        color: #cbd5e1;
      }

      .systemBtn {
        background: #1e293b;
        color: #f8fafc;
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .errorBox {
        background: #24130b;
        color: #fed7aa;
        border-color: rgba(249, 115, 22, 0.35);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .errorBox::before {
        background: #fb923c;
      }

      .errorIcon {
        background: rgba(251, 146, 60, 0.16);
        color: #fdba74;
      }

      .errorMessage {
        color: #fed7aa;
      }

      .errorAction {
        color: #fdba74;
      }

      .topCard {
        background: linear-gradient(
          135deg,
          rgba(248, 250, 252, 0.95) 0%,
          rgba(232, 241, 251, 0.95) 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #0f172a;
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        border: none;
      }

      .smallLabel {
        color: rgba(15, 23, 42, 0.62);
      }

      .title,
      .mainValue,
      .topPound {
        color: #0b1220;
      }

      .topPoundUnit {
        color: rgba(15, 23, 42, 0.58);
      }

      .typeBadge {
        background: rgba(15, 23, 42, 0.96);
        color: rgba(255, 255, 255, 0.96);
      }

      .repairNotice,
      .banNotice {
        background: rgba(15, 23, 42, 0.08);
        color: #991b1b;
      }

      .topCard .badge,
      .topCard .repairNotice {
        border: none;
        box-shadow: none;
      }

      .topCard .badge.normal {
        background: #bbf7d0;
        color: #14532d;
      }

      .topCard .badge.repair {
        background: #fecaca;
        color: #991b1b;
      }

      .topCard .badge.bad {
        background: #fde68a;
        color: #78350f;
      }

      .topCard .badge.deleted {
        background: #cbd5e1;
        color: #1e293b;
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentItem = null;
    let currentMode = "bow";
    let currentKey = "";

    init();

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);

        currentMode = getMode(params);
        currentKey =
          params.get("id") ||
          params.get("c") ||
          params.get("code") ||
          params.get("serial") ||
          "";

        if (!currentKey) {
          showError("조회 코드가 없습니다.");
          return;
        }

        const apiUrl = buildApiUrl(currentMode, currentKey);
        const response = await fetch(apiUrl);

        if (!response.ok) {
          showError("장비 정보를 찾을 수 없습니다.");
          return;
        }

        currentItem = await response.json();
        renderPage(currentItem);
      } catch (error) {
        showError("장비 정보를 불러오지 못했습니다.");
      }
    }

    function getMode(params) {
      const raw = String(
        params.get("t") ||
        params.get("type") ||
        params.get("mode") ||
        "bow"
      ).trim().toLowerCase();

      if (raw === "p" || raw === "personal" || raw === "item" || raw === "private") {
        return "personal";
      }

      return "bow";
    }

    function buildApiUrl(mode, key) {
      if (mode === "personal") {
        return "/api/bow?t=p&c=" + encodeURIComponent(key);
      }

      return "/api/bow?id=" + encodeURIComponent(key);
    }

    function renderPage(item) {
      const isPersonal = item.mode === "personal";
      const status = item.status || "-";
      const badgeClass = getBadgeClass(status);

      const isRepairNeeded = status === "수리 필요";
      const isBadStatus = status === "불량";
      const isDeletedStatus = status === "말소";
      const isRepairBlocked = isBadStatus || isDeletedStatus;

      const noticeText = isBadStatus
        ? "사용 금지"
        : isRepairNeeded
          ? "사용 전 확인 필요"
          : "";

      const typeLabel = isPersonal ? "개인 장비" : "공용 장비";
      const mainLabel = isPersonal ? "소유자" : "일련번호";
      const mainValue = isPersonal ? item.owner : item.serial;
      const mainValueClass = isPersonal ? "ownerValue" : "serialValue";
      const sectionTitle = "장비 정보";

      const titleText = `${item.brand || "-"} ${item.size || ""}`.trim();
      const poundText = item.pound
        ? `${escapeHtml(item.pound)}<span class="topPoundUnit">lb</span>`
        : `-<span class="topPoundUnit">lb</span>`;

      document.title = isPersonal
        ? `${item.code || ""} 장비`
        : `${item.serial || ""}번 활`;

      app.innerHTML = `
        <div class="topCard">
          <div class="typeBadge">${escapeHtml(typeLabel)}</div>

          <div class="mainBlock">
            <div class="smallLabel">${mainLabel}</div>
            <div class="mainValue ${mainValueClass}">${escapeHtml(mainValue || "-")}</div>
          </div>

          <div class="titleLine">
            <div class="title">${escapeHtml(titleText)}</div>
            <div class="topPound">${poundText}</div>
          </div>

          <div class="statusRow">
            <div id="statusBadge" class="badge ${badgeClass}">
              ${escapeHtml(status)}
            </div>

            <div id="repairNotice" class="repairNotice ${isRepairNeeded || isBadStatus ? "" : "hidden"} ${isBadStatus ? "banNotice" : ""}">
              ${escapeHtml(noticeText)}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">${sectionTitle}</div>

          <div class="infoGrid">
            ${renderInfoCards(item)}
          </div>

          <div class="fullItem">
            <div class="fullLabel">점검 내역</div>
            <div id="checkView" class="fullValue">${escapeHtml(item.check || "-")}</div>
          </div>
        </div>

        ${!isPersonal ? renderBorrowSection(item) : ""}

        <div class="section">
          <div class="sectionTitle">수리 요청</div>

          ${
            isRepairBlocked
              ? `
                <div class="repairBlockedBox">
                  <div class="repairBlockedTitle">
                    수리 요청을 할 수 없습니다
                  </div>
                  <div class="repairBlockedText">
                    이 장비는 ${escapeHtml(status)} 상태입니다.<br>
                    사용하거나 수리 요청하지 말고 담당자에게 문의하세요.
                  </div>
                </div>
              `
              : `
                <textarea id="repairRequest" placeholder="수리가 필요한 내용을 입력하세요."></textarea>

                <button id="saveBtn" onclick="submitRepairRequest()">제출</button>
                <button id="completeBtn" class="completeBtn ${isRepairNeeded ? "" : "hidden"}" onclick="completeRepair()">수리 완료</button>

                <div id="result" class="result"></div>
              `
          }
        </div>

        <a class="systemBtn" href="/dashboard.html">
          공용 장비 현황
        </a>

        <div class="hint">
          서울대학교 국궁부 ${isPersonal ? "개인 장비" : "공용 장비"} 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function renderInfoCards(item) {
      if (item.mode === "personal") {
        return `
          ${miniCard("식별 코드", item.code)}
          ${miniCard("소유자", item.owner)}
          ${miniCard("브랜드", item.brand)}
          ${miniCard("사이즈", item.size)}
          ${miniCard("파운드", item.pound ? item.pound + " lb" : "-")}
          ${miniCard("상태", item.status, true, "statusView")}
        `;
      }

      return `
        ${miniCard("일련번호", item.serial)}
        ${miniCard("상태", item.status, true, "statusView")}
        ${miniCard("브랜드", item.brand)}
        ${miniCard("사이즈", item.size)}
        ${miniCard("파운드", item.pound ? item.pound + " lb" : "-")}
        ${miniCard("기타", item.etc, true)}
      `;
    }

    function renderBorrowSection(item) {
      const borrowedBy = String(item.borrowedBy || "").trim();

      if (borrowedBy) {
        return `
          <div class="section">
            <div class="sectionTitle">개인 반출</div>

            <div class="borrowLockedBox">
              <div>
                <div class="borrowLabel">현재 반출자</div>
                <div id="borrowedByView" class="borrowName">${escapeHtml(borrowedBy)}</div>
              </div>

              <div class="borrowLockedBadge">
                수정 불가
              </div>
            </div>

            <div class="borrowHelp">
              반납 처리 또는 반출자 변경은 임원진에게 문의하세요.
            </div>
          </div>
        `;
      }

      return `
        <div class="section">
          <div class="sectionTitle">개인 반출</div>

          <div class="borrowInputBox">
            <input
              id="borrowedByInput"
              class="borrowInput"
              type="text"
              placeholder="반출자 이름 입력"
              autocomplete="off"
              onkeydown="handleBorrowKey(event)"
            >

            <button id="borrowSaveBtn" class="borrowSaveBtn" onclick="submitBorrowedBy()">
              등록
            </button>
          </div>

          <div id="borrowResult" class="result"></div>

          <div class="borrowHelp">
            한 번 등록한 반출자는 이 화면에서 수정할 수 없습니다.
          </div>
        </div>
      `;
    }

    function miniCard(label, value, small = false, id = "") {
      return `
        <div class="miniCard">
          <div class="miniLabel">${escapeHtml(label)}</div>
          <div ${id ? `id="${id}"` : ""} class="miniValue ${small ? "small" : ""}">
            ${escapeHtml(value || "-")}
          </div>
        </div>
      `;
    }

    function handleBorrowKey(event) {
      if (event.key === "Enter") {
        submitBorrowedBy();
      }
    }

    async function submitBorrowedBy() {
      if (currentMode !== "bow") return;

      if (currentItem?.borrowedBy) {
        alert("이미 반출자가 등록되어 있어 수정할 수 없습니다.");
        return;
      }

      const input = document.getElementById("borrowedByInput");
      const btn = document.getElementById("borrowSaveBtn");
      const result = document.getElementById("borrowResult");

      const borrowedBy = String(input?.value || "").trim();

      if (!borrowedBy) {
        if (result) {
          result.className = "result error";
          result.textContent = "반출자 이름을 입력해주세요.";
        }
        input?.focus();
        return;
      }

      if (btn) btn.disabled = true;
      if (result) {
        result.className = "result";
        result.textContent = "등록 중...";
      }

      try {
        const response = await fetch("/api/bow", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            type: "bow",
            id: currentKey,
            action: "saveBorrowedBy",
            borrowedBy
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok) {
          throw new Error(data?.message || data?.error || "반출자 등록 실패");
        }

        if (currentItem) {
          currentItem.borrowedBy = borrowedBy;
        }

        if (result) {
          result.className = "result success";
          result.textContent = "개인 반출이 등록되었습니다.";
        }

        setTimeout(() => {
          renderPage(currentItem);
        }, 500);
      } catch (error) {
        if (result) {
          result.className = "result error";
          result.textContent = "등록 실패: " + error.message;
        }
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function submitRepairRequest() {
      if (currentItem?.status === "불량" || currentItem?.status === "말소") {
        return;
      }

      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "수리 필요";
      const check = textarea.value.trim();

      result.className = "result";

      if (!check) {
        result.textContent = "수리 요청 내용을 입력해주세요.";
        result.classList.add("error");
        return;
      }

      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "제출 중...";

      try {
        await saveStatusAndCheck(status, check, "제출 실패");

        textarea.value = "";
        result.textContent = "수리 요청이 접수되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "제출 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function completeRepair() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "정상";
      const check = formatDate(new Date());

      result.className = "result";
      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "처리 중...";

      try {
        await saveStatusAndCheck(status, check, "수리 완료 처리 실패");

        if (textarea) textarea.value = "";
        result.textContent = `수리 완료 처리되었습니다.\n점검 내역에 ${check} 날짜가 기록되었습니다.`;
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "수리 완료 처리 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function saveStatusAndCheck(status, check, fallbackMessage) {
      const body = {
        type: currentMode,
        status,
        check
      };

      if (currentMode === "personal") {
        body.code = currentKey;
      } else {
        body.id = currentKey;
      }

      const response = await fetch("/api/bow", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(data?.message || data?.error || fallbackMessage);
      }

      return data;
    }

    function updatePageAfterSave(status, check) {
      if (currentItem) {
        currentItem.status = status;
        currentItem.check = check;
      }

      const badge = document.getElementById("statusBadge");
      badge.textContent = status || "-";
      badge.className = "badge " + getBadgeClass(status);

      const statusView = document.getElementById("statusView");
      if (statusView) {
        statusView.textContent = status || "-";
      }

      const checkView = document.getElementById("checkView");
      if (checkView) {
        checkView.textContent = check || "-";
      }

      const repairNotice = document.getElementById("repairNotice");
      if (repairNotice) {
        repairNotice.classList.remove("banNotice");

        if (status === "수리 필요") {
          repairNotice.textContent = "사용 전 확인 필요";
          repairNotice.classList.remove("hidden");
        } else if (status === "불량") {
          repairNotice.textContent = "사용 금지";
          repairNotice.classList.add("banNotice");
          repairNotice.classList.remove("hidden");
        } else {
          repairNotice.textContent = "";
          repairNotice.classList.add("hidden");
        }
      }

      const completeBtn = document.getElementById("completeBtn");
      if (completeBtn) {
        if (status === "수리 필요") {
          completeBtn.classList.remove("hidden");
        } else {
          completeBtn.classList.add("hidden");
        }
      }
    }

    function getBadgeClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function formatDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          <div class="errorTitle">
            <span class="errorIcon">!</span>
            장비를 찾을 수 없습니다
          </div>

          <div class="errorMessage">
            해당 일련번호 또는 식별코드의 장비가 등록되어 있지 않습니다.
          </div>

          <div class="errorAction">
            번호를 확인한 뒤 다시 조회해주세요.
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>

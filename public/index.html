<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 장비 정보</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding-bottom: 28px;
    }

    .loadingLogoWrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d8e8ef;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .errorBox {
      position: relative;
      overflow: hidden;
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 14px auto;
      background: #fff7ed;
      color: #7c2d12;
      border: 1px solid #fed7aa;
      border-radius: 24px;
      padding: 22px 22px 20px;
      box-shadow: 0 10px 28px rgba(124, 45, 18, 0.10);
      font-weight: 850;
      line-height: 1.5;
    }

    .errorBox::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: #f97316;
    }

    .errorTitle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .errorIcon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffedd5;
      color: #c2410c;
      font-size: 16px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .errorMessage {
      font-size: 15px;
      font-weight: 850;
      color: #9a3412;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .errorAction {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 850;
      color: #c2410c;
    }

    .topCard {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 100dvh;
      background: #d8e8ef;
      color: #071022;
      border-radius: 0;
      padding: 34px 28px 30px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }

    .topCard::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.42), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 45%);
      pointer-events: none;
    }

    .topCard::after {
      content: "";
      position: absolute;
      top: 0;
      right: clamp(34px, 11vw, 72px);
      width: 4px;
      height: 58%;
      background: #071022;
      opacity: 0.92;
      border-radius: 0 0 999px 999px;
      z-index: 1;
    }

    .stringKnob {
      position: absolute;
      right: calc(clamp(34px, 11vw, 72px) - 13px);
      top: 47%;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 6px solid #071022;
      background: #d8e8ef;
      z-index: 3;
    }

    .stringKnob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      width: 28px;
      height: 56px;
      border-radius: 999px;
      background: rgba(7, 16, 34, 0.15);
      z-index: -1;
    }

    .topCardInner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      min-height: calc(100dvh - 64px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .topHeader {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      min-height: 38px;
    }

    .topClub {
      font-size: 13px;
      font-weight: 950;
      letter-spacing: -0.02em;
      color: rgba(7, 16, 34, 0.72);
    }

    .topType {
      font-size: 13px;
      font-weight: 950;
      padding: 7px 10px;
      border: 2px solid rgba(7, 16, 34, 0.76);
      border-radius: 999px;
      white-space: nowrap;
      color: #071022;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .heroNumbers {
      margin-top: 30px;
      width: min(70%, 330px);
    }

    .metricLabel {
      font-size: 13px;
      font-weight: 950;
      color: rgba(7, 16, 34, 0.58);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .primaryNumber {
      font-size: 112px;
      line-height: 0.78;
      font-weight: 950;
      letter-spacing: -0.08em;
      color: #071022;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .ownerNumber {
      font-size: 56px;
      line-height: 0.96;
      letter-spacing: -0.065em;
    }

    .numberDivider {
      width: 74px;
      height: 3px;
      border-radius: 999px;
      background: rgba(7, 16, 34, 0.62);
      margin: 18px 0 16px;
    }

    .poundNumber {
      font-size: 96px;
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: -0.08em;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 1px 0 rgba(7, 16, 34, 0.10);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .poundNumber span {
      font-size: 27px;
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-left: 5px;
    }

    .lowerInfo {
      margin-top: auto;
      padding-top: 28px;
      padding-bottom: 8px;
    }

    .statusIcon {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: #071022;
      color: #d8e8ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 950;
      margin-bottom: 14px;
      box-shadow: 0 10px 22px rgba(7, 16, 34, 0.14);
    }

    .statusMain {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge,
    .repairNotice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 15px;
      box-shadow: none;
    }

    .badge.normal {
      background: #071022;
      color: #ffffff;
    }

    .badge.repair {
      background: #ffffff;
      color: #991b1b;
    }

    .badge.bad {
      background: #071022;
      color: #facc15;
    }

    .badge.deleted {
      background: #071022;
      color: #d1d5db;
    }

    .repairNotice {
      background: rgba(7, 16, 34, 0.10);
      color: #071022;
      border: 2px solid rgba(7, 16, 34, 0.22);
    }

    .repairNotice.hidden {
      display: none;
    }

    .banNotice {
      background: rgba(7, 16, 34, 0.10);
      color: #071022;
      border: 2px solid rgba(7, 16, 34, 0.22);
    }

    .checkText {
      font-size: 30px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: -0.055em;
      color: #071022;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      margin-bottom: 8px;
    }

    .metaText {
      font-size: 15px;
      line-height: 1.35;
      font-weight: 850;
      color: rgba(7, 16, 34, 0.78);
      word-break: keep-all;
      overflow-wrap: anywhere;
      margin-bottom: 14px;
    }

    .bottomIcons {
      display: flex;
      gap: 12px;
      color: rgba(7, 16, 34, 0.70);
      font-size: 18px;
      font-weight: 900;
    }

    .scrollHint {
      margin-top: 16px;
      font-size: 12px;
      font-weight: 950;
      color: rgba(7, 16, 34, 0.50);
    }

    .section {
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 0 auto 14px;
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      font-weight: 850;
      margin: 14px 0 7px;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    #repairRequest {
      font-size: 17px;
      color: var(--text);
    }

    #repairRequest::placeholder {
      font-size: 16px;
      color: #7b8798;
      font-weight: 500;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .completeBtn {
      margin-top: 10px;
      background: #475569;
    }

    .completeBtn.hidden {
      display: none;
    }

    .result {
      margin-top: 13px;
      font-size: 15px;
      font-weight: 850;
      min-height: 22px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-line;
    }

    .result.success {
      color: #166534;
    }

    .result.error {
      color: #991b1b;
    }

    .repairBlockedBox {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.5;
    }

    .repairBlockedTitle {
      font-size: 17px;
      font-weight: 950;
      color: #991b1b;
      margin-bottom: 6px;
    }

    .repairBlockedText {
      font-size: 14px;
      font-weight: 850;
      color: #64748b;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .systemBtn {
      display: block;
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 0 auto 14px;
      padding: 15px 16px;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      background: #e2e8f0;
      color: #0f172a;
    }

    .systemBtn:active {
      transform: translateY(1px);
    }

    .hint {
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 420px) {
      .topCard {
        min-height: 100dvh;
        padding: 34px 24px 30px;
      }

      .topCardInner {
        min-height: calc(100dvh - 64px);
      }

      .heroNumbers {
        margin-top: 28px;
        width: min(72%, 320px);
      }

      .primaryNumber {
        font-size: 104px;
      }

      .ownerNumber {
        font-size: 48px;
      }

      .numberDivider {
        width: 66px;
        margin: 16px 0 14px;
      }

      .poundNumber {
        font-size: 88px;
      }

      .poundNumber span {
        font-size: 25px;
      }

      .checkText {
        font-size: 27px;
      }

      .metaText {
        font-size: 14px;
      }

      .section {
        width: calc(100% - 20px);
        border-radius: 22px;
        padding: 18px;
      }

      .systemBtn,
      .hint {
        width: calc(100% - 20px);
      }
    }

    @media (max-height: 700px) {
      .topCard {
        padding-top: 26px;
        padding-bottom: 24px;
      }

      .topCardInner {
        min-height: calc(100dvh - 50px);
      }

      .heroNumbers {
        margin-top: 20px;
      }

      .primaryNumber {
        font-size: 86px;
      }

      .ownerNumber {
        font-size: 38px;
      }

      .numberDivider {
        margin: 12px 0 10px;
      }

      .poundNumber {
        font-size: 70px;
      }

      .poundNumber span {
        font-size: 22px;
      }

      .lowerInfo {
        padding-top: 18px;
      }

      .statusIcon {
        width: 48px;
        height: 48px;
        font-size: 21px;
        margin-bottom: 10px;
      }

      .checkText {
        font-size: 23px;
      }

      .metaText {
        font-size: 13px;
        margin-bottom: 8px;
      }

      .scrollHint {
        margin-top: 10px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .loadingLogoWrap {
        background: #0b1020;
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .topCard {
        background: #090d1f;
        color: #eaf6ff;
      }

      .topCard::before {
        background:
          radial-gradient(circle at 78% 18%, rgba(255,255,255,0.08), transparent 28%),
          linear-gradient(180deg, rgba(255,255,255,0.04), transparent 42%);
      }

      .topCard::after {
        background: #cfe7f1;
      }

      .stringKnob {
        border-color: #cfe7f1;
        background: #090d1f;
      }

      .stringKnob::after {
        background: rgba(207, 231, 241, 0.22);
      }

      .topClub,
      .topType,
      .primaryNumber,
      .checkText,
      .bottomIcons {
        color: #eaf6ff;
      }

      .topType {
        border-color: rgba(234, 246, 255, 0.72);
        background: rgba(255,255,255,0.06);
      }

      .metricLabel,
      .metaText,
      .scrollHint {
        color: rgba(234, 246, 255, 0.68);
      }

      .numberDivider {
        background: rgba(234, 246, 255, 0.68);
      }

      .poundNumber {
        color: rgba(234, 246, 255, 0.72);
      }

      .statusIcon {
        background: #cfe7f1;
        color: #090d1f;
      }

      .badge.normal {
        background: #eaf6ff;
        color: #090d1f;
      }

      .badge.repair {
        background: #fecaca;
        color: #991b1b;
      }

      .badge.bad {
        background: #facc15;
        color: #111827;
      }

      .badge.deleted {
        background: #334155;
        color: #e2e8f0;
      }

      .repairNotice,
      .banNotice {
        background: rgba(255, 255, 255, 0.10);
        color: #fecaca;
        border-color: rgba(255, 255, 255, 0.24);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .sectionTitle {
        color: #f8fafc;
      }

      .repairBlockedBox {
        background: #172033;
        border: none;
      }

      .repairBlockedTitle {
        color: #fca5a5;
      }

      .repairBlockedText {
        color: #94a3b8;
      }

      label {
        color: #9aa8bc;
      }

      textarea {
        background: #172033;
        color: #f8fafc;
        border: none;
        box-shadow: none;
      }

      textarea:focus {
        border: none;
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.14);
      }

      #repairRequest {
        color: #f8fafc;
      }

      #repairRequest::placeholder {
        color: #7b8798;
      }

      button {
        background: #334155;
        box-shadow: none;
      }

      button:active {
        background: #475569;
      }

      .completeBtn {
        background: #263449;
      }

      .completeBtn:active {
        background: #334155;
      }

      .result,
      .hint {
        color: #94a3b8;
      }

      .result.success {
        color: #86efac;
      }

      .result.error {
        color: #fca5a5;
      }

      .systemBtn {
        background: #1e293b;
        color: #f8fafc;
      }

      .errorBox {
        background: #24130b;
        color: #fed7aa;
        border-color: rgba(249, 115, 22, 0.35);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .errorBox::before {
        background: #fb923c;
      }

      .errorIcon {
        background: rgba(251, 146, 60, 0.16);
        color: #fdba74;
      }

      .errorMessage {
        color: #fed7aa;
      }

      .errorAction {
        color: #fdba74;
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentItem = null;
    let currentMode = "bow";
    let currentKey = "";

    init();

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);

        currentMode = getMode(params);
        currentKey =
          params.get("id") ||
          params.get("c") ||
          params.get("code") ||
          params.get("serial") ||
          "";

        if (!currentKey) {
          showError("조회 코드가 없습니다.");
          return;
        }

        const apiUrl = buildApiUrl(currentMode, currentKey);
        const response = await fetch(apiUrl);

        if (!response.ok) {
          showError("장비 정보를 찾을 수 없습니다.");
          return;
        }

        currentItem = await response.json();
        renderPage(currentItem);
      } catch (error) {
        showError("장비 정보를 불러오지 못했습니다.");
      }
    }

    function getMode(params) {
      const raw = String(
        params.get("t") ||
        params.get("type") ||
        params.get("mode") ||
        "bow"
      ).trim().toLowerCase();

      if (raw === "p" || raw === "personal" || raw === "item" || raw === "private") {
        return "personal";
      }

      return "bow";
    }

    function buildApiUrl(mode, key) {
      if (mode === "personal") {
        return "/api/bow?t=p&c=" + encodeURIComponent(key);
      }

      return "/api/bow?id=" + encodeURIComponent(key);
    }

    function renderPage(item) {
      const isPersonal = item.mode === "personal";
      const status = item.status || "-";
      const badgeClass = getBadgeClass(status);

      const isRepairNeeded = status === "수리 필요";
      const isBadStatus = status === "불량";
      const isDeletedStatus = status === "말소";
      const isRepairBlocked = isBadStatus || isDeletedStatus;

      const noticeText = isBadStatus
        ? "사용 금지"
        : isRepairNeeded
          ? "사용 전 확인 필요"
          : "";

      const typeLabel = isPersonal ? "개인 장비" : "공용 장비";
      const primaryLabel = isPersonal ? "식별 코드" : "일련번호";
      const primaryValue = isPersonal ? item.code : item.serial;
      const primaryClass = isPersonal ? "ownerNumber" : "";

      const poundValue = item.pound || "-";

      const metaText = isPersonal
        ? `소유자 ${item.owner || "-"} · 브랜드 ${item.brand || "-"} · 사이즈 ${item.size || "-"}`
        : `브랜드 ${item.brand || "-"} · 사이즈 ${item.size || "-"} · 기타 ${item.etc || "-"}`;

      document.title = isPersonal
        ? `${item.code || ""} 장비`
        : `${item.serial || ""}번 활`;

      app.innerHTML = `
        <div class="topCard">
          <div class="stringKnob"></div>

          <div class="topCardInner">
            <div class="topHeader">
              <div class="topClub">서울대학교 국궁부</div>
              <div class="topType">${escapeHtml(typeLabel)}</div>
            </div>

            <div class="heroNumbers">
              <div class="metricLabel">${escapeHtml(primaryLabel)}</div>
              <div class="primaryNumber ${primaryClass}">
                ${escapeHtml(primaryValue || "-")}
              </div>

              <div class="numberDivider"></div>

              <div class="metricLabel">파운드</div>
              <div class="poundNumber">
                ${escapeHtml(poundValue)}<span>lb</span>
              </div>
            </div>

            <div class="lowerInfo">
              <div class="statusIcon">${escapeHtml(getStatusIcon(status))}</div>

              <div class="statusMain">
                <div id="statusBadge" class="badge ${badgeClass}">
                  ${escapeHtml(status)}
                </div>

                <div id="repairNotice" class="repairNotice ${isRepairNeeded || isBadStatus ? "" : "hidden"} ${isBadStatus ? "banNotice" : ""}">
                  ${escapeHtml(noticeText)}
                </div>
              </div>

              <div id="checkView" class="checkText">
                ${escapeHtml(item.check || "-")}
              </div>

              <div class="metaText">
                ${escapeHtml(metaText)}
              </div>

              <div id="statusView" style="display:none;">${escapeHtml(status)}</div>

              <div class="bottomIcons">
                <span>⌒</span>
                <span>▻</span>
                <span>◎</span>
              </div>

              <div class="scrollHint">
                아래로 스크롤하여 수리 요청
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">수리 요청</div>

          ${
            isRepairBlocked
              ? `
                <div class="repairBlockedBox">
                  <div class="repairBlockedTitle">
                    수리 요청을 할 수 없습니다
                  </div>
                  <div class="repairBlockedText">
                    이 장비는 ${escapeHtml(status)} 상태입니다.<br>
                    사용하거나 수리 요청하지 말고 담당자에게 문의하세요.
                  </div>
                </div>
              `
              : `
                <textarea id="repairRequest" placeholder="수리가 필요한 내용을 입력하세요."></textarea>

                <button id="saveBtn" onclick="submitRepairRequest()">제출</button>
                <button id="completeBtn" class="completeBtn ${isRepairNeeded ? "" : "hidden"}" onclick="completeRepair()">수리 완료</button>

                <div id="result" class="result"></div>
              `
          }
        </div>

        <a class="systemBtn" href="/dashboard.html">
          공용 장비 현황
        </a>

        <div class="hint">
          서울대학교 국궁부 ${isPersonal ? "개인 장비" : "공용 장비"} 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function getStatusIcon(status) {
      if (status === "수리 필요") return "!";
      if (status === "불량") return "×";
      if (status === "말소") return "-";
      return "✓";
    }

    async function submitRepairRequest() {
      if (currentItem?.status === "불량" || currentItem?.status === "말소") {
        return;
      }

      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "수리 필요";
      const check = textarea.value.trim();

      result.className = "result";

      if (!check) {
        result.textContent = "수리 요청 내용을 입력해주세요.";
        result.classList.add("error");
        return;
      }

      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "제출 중...";

      try {
        await saveStatusAndCheck(status, check, "제출 실패");

        textarea.value = "";
        result.textContent = "수리 요청이 접수되었습니다.";
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "제출 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function completeRepair() {
      const btn = document.getElementById("saveBtn");
      const completeBtn = document.getElementById("completeBtn");
      const result = document.getElementById("result");
      const textarea = document.getElementById("repairRequest");

      const status = "정상";
      const check = formatDate(new Date());

      result.className = "result";
      btn.disabled = true;
      if (completeBtn) completeBtn.disabled = true;
      result.textContent = "처리 중...";

      try {
        await saveStatusAndCheck(status, check, "수리 완료 처리 실패");

        if (textarea) textarea.value = "";
        result.textContent = `수리 완료 처리되었습니다.\n점검 내역에 ${check} 날짜가 기록되었습니다.`;
        result.classList.add("success");

        updatePageAfterSave(status, check);
      } catch (error) {
        result.textContent = "수리 완료 처리 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
        if (completeBtn) completeBtn.disabled = false;
      }
    }

    async function saveStatusAndCheck(status, check, fallbackMessage) {
      const body = {
        type: currentMode,
        status,
        check
      };

      if (currentMode === "personal") {
        body.code = currentKey;
      } else {
        body.id = currentKey;
      }

      const response = await fetch("/api/bow", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(data?.message || data?.error || fallbackMessage);
      }

      return data;
    }

    function updatePageAfterSave(status, check) {
      if (currentItem) {
        currentItem.status = status;
        currentItem.check = check;
      }

      const badge = document.getElementById("statusBadge");
      badge.textContent = status || "-";
      badge.className = "badge " + getBadgeClass(status);

      const statusView = document.getElementById("statusView");
      if (statusView) {
        statusView.textContent = status || "-";
      }

      const checkView = document.getElementById("checkView");
      if (checkView) {
        checkView.textContent = check || "-";
      }

      const statusIcon = document.querySelector(".statusIcon");
      if (statusIcon) {
        statusIcon.textContent = getStatusIcon(status);
      }

      const repairNotice = document.getElementById("repairNotice");
      if (repairNotice) {
        repairNotice.classList.remove("banNotice");

        if (status === "수리 필요") {
          repairNotice.textContent = "사용 전 확인 필요";
          repairNotice.classList.remove("hidden");
        } else if (status === "불량") {
          repairNotice.textContent = "사용 금지";
          repairNotice.classList.add("banNotice");
          repairNotice.classList.remove("hidden");
        } else {
          repairNotice.textContent = "";
          repairNotice.classList.add("hidden");
        }
      }

      const completeBtn = document.getElementById("completeBtn");
      if (completeBtn) {
        if (status === "수리 필요") {
          completeBtn.classList.remove("hidden");
        } else {
          completeBtn.classList.add("hidden");
        }
      }
    }

    function getBadgeClass(status) {
      if (status === "수리 필요") return "repair";
      if (status === "불량") return "bad";
      if (status === "말소") return "deleted";
      return "normal";
    }

    function formatDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          <div class="errorTitle">
            <span class="errorIcon">!</span>
            장비를 찾을 수 없습니다
          </div>

          <div class="errorMessage">
            해당 일련번호 또는 식별코드의 장비가 등록되어 있지 않습니다.
          </div>

          <div class="errorAction">
            번호를 확인한 뒤 다시 조회해주세요.
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>

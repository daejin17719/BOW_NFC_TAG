<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공용 장비 현황1</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background:
        radial-gradient(circle at top left, #e0f2fe 0, transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 28px;
    }

    .loadingLogoWrap {
      min-height: calc(100dvh - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .topCard {
      position: relative;
      overflow: hidden;
      min-height: 230px;
      background: linear-gradient(135deg, #121c2d 0%, #2d3e54 100%);
      color: white;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.22);
      margin-bottom: 14px;
    }

    .smallLabel {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
    }

    .mainTitle {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 18px;
    }

    .mainStatRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .mainStat {
      min-width: 0;
    }

    .mainStatLabel {
      font-size: 13px;
      font-weight: 850;
      color: rgba(255,255,255,0.64);
      margin-bottom: 7px;
    }

    .mainStatValue {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .mainNumber {
      font-size: 54px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .mainUnit {
      font-size: 19px;
      font-weight: 850;
      color: rgba(255,255,255,0.78);
    }

    .topDesc {
      margin-top: 14px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
      color: rgba(255,255,255,0.74);
    }

    .badgeLine {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: none;
    }

    .badge.normal {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .badge.repair {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .badge.arrow {
      background: #e0f2fe;
      color: #075985;
    }

    .section {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 14px;
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .statGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .statCard {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 15px;
      min-height: 96px;
    }

    .statLabel {
      font-size: 13px;
      color: var(--muted);
      font-weight: 850;
      margin-bottom: 10px;
    }

    .statValue {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .statCard.repair .statValue {
      color: #991b1b;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
    }

    .repairItem {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      min-height: 54px;
    }

    .repairTitle {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
      white-space: nowrap;
    }

    .repairCheck {
      justify-self: end;
      text-align: right;
      font-size: 18px;
      font-weight: 900;
      color: #334155;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .emptyBox {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 18px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 850;
      line-height: 1.45;
    }

    .arrowCategoryList {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .arrowCategoryItem {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 13px 15px;
    }

    .arrowCategoryLabel {
      font-size: 15px;
      font-weight: 850;
      color: #475569;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .arrowControl {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .arrowControlBtn {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
    }

    .arrowControlBtn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .arrowCategoryValue {
      min-width: 34px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      color: #0f172a;
    }

    .arrowCategoryItem.repair .arrowCategoryLabel,
    .arrowCategoryItem.repair .arrowCategoryValue {
      color: #991b1b;
    }

    .arrowCategoryItem.total {
      background: #eef2ff;
    }

    .arrowCategoryItem.total .arrowCategoryLabel,
    .arrowCategoryItem.total .arrowCategoryValue {
      color: #1e3a8a;
    }

    .saveBtn {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: #0f172a;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    .saveBtn:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .saveResult {
      margin-top: 12px;
      min-height: 22px;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.5;
      color: var(--muted);
      white-space: pre-line;
    }

    .saveResult.success {
      color: #166534;
    }

    .saveResult.error {
      color: #991b1b;
    }

    .arrowHelp {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.5;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .errorBox {
      background: #fff7f7;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 24px;
      padding: 22px;
      font-weight: 850;
      line-height: 1.5;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      white-space: pre-line;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .topCard {
        min-height: 210px;
        border-radius: 24px;
        padding: 24px 26px;
      }

      .mainTitle {
        font-size: 28px;
      }

      .mainNumber {
        font-size: 50px;
      }

      .mainUnit {
        font-size: 18px;
      }

      .section {
        border-radius: 22px;
        padding: 18px;
      }

      .repairItem {
        gap: 14px;
      }

      .repairTitle {
        font-size: 23px;
      }

      .repairCheck {
        font-size: 17px;
      }

      .smallLabel,
      .mainTitle,
      .mainNumber,
      .sectionTitle,
      .statValue,
      .repairTitle,
      .repairCheck,
      .badge,
      .arrowCategoryValue,
      .arrowControlBtn,
      .saveBtn {
        font-weight: 900;
      }

      .mainUnit,
      .topDesc,
      .statLabel,
      .emptyBox,
      .hint,
      .arrowCategoryLabel,
      .arrowHelp,
      .saveResult {
        font-weight: 850;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .topCard {
        background: linear-gradient(
          135deg,
          rgba(248, 250, 252, 0.95) 0%,
          rgba(232, 241, 251, 0.95) 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #0f172a;
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        border: none;
      }

      .smallLabel {
        color: rgba(15, 23, 42, 0.62);
      }

      .mainStatLabel,
      .mainUnit,
      .topDesc {
        color: rgba(15, 23, 42, 0.62);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .sectionTitle {
        color: #f8fafc;
      }

      .statCard,
      .item,
      .emptyBox,
      .arrowCategoryItem {
        background: #172033;
        border: none;
      }

      .statLabel,
      .emptyBox,
      .hint,
      .arrowCategoryLabel,
      .arrowHelp,
      .saveResult {
        color: #94a3b8;
      }

      .repairCheck {
        color: #f8fafc;
      }

      .arrowCategoryValue {
        color: #f8fafc;
      }

      .arrowControlBtn {
        background: #263449;
        color: #f8fafc;
      }

      .arrowCategoryItem.repair .arrowCategoryLabel,
      .arrowCategoryItem.repair .arrowCategoryValue {
        color: #fca5a5;
      }

      .arrowCategoryItem.total {
        background: #1e293b;
      }

      .arrowCategoryItem.total .arrowCategoryLabel,
      .arrowCategoryItem.total .arrowCategoryValue {
        color: #bfdbfe;
      }

      .saveBtn {
        background: #334155;
        box-shadow: none;
      }

      .saveResult.success {
        color: #86efac;
      }

      .saveResult.error {
        color: #fca5a5;
      }

      .errorBox {
        background: #2b1111;
        color: #fecaca;
        border-color: #7f1d1d;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentData = null;
    let arrowCategories = [];

    init();

    async function init() {
      try {
        const response = await fetch("/api/summary");
        const text = await response.text();

        let data;

        try {
          data = JSON.parse(text);
        } catch (error) {
          showError(
            "종합 관리 API가 JSON이 아닌 응답을 반환했습니다.\n" +
            "functions/api/summary.js 파일 위치와 배포 상태를 확인하세요."
          );
          return;
        }

        if (!response.ok) {
          showError(data?.message || data?.error || "종합 관리 정보를 불러오지 못했습니다.");
          return;
        }

        renderDashboard(data);
      } catch (error) {
        showError("불러오기 실패: " + error.message);
      }
    }

    function renderDashboard(data) {
      currentData = data;

      const summary = data.summary || {};
      const repairBows = data.repairBows || [];
      const arrowSummary = data.arrowSummary || {};
      const arrowBadges = arrowSummary.badges || {};

      arrowCategories = normalizeCategories(arrowSummary.categories || []);

      app.innerHTML = `
        <div class="topCard">
          <div class="smallLabel">서울대학교 국궁부</div>
          <div class="mainTitle">공용 장비 현황1</div>

          <div class="mainStatRow">
            <div class="mainStat">
              <div class="mainStatLabel">공용 활</div>
              <div class="mainStatValue">
                <div class="mainNumber">${escapeHtml(summary.topBowValue || summary.total || 0)}</div>
                <div class="mainUnit">장</div>
              </div>
            </div>

            <div class="mainStat">
              <div class="mainStatLabel">공용 화살</div>
              <div class="mainStatValue">
                <div class="mainNumber">${escapeHtml(arrowSummary.total || 0)}</div>
                <div class="mainUnit">대</div>
              </div>
            </div>
          </div>

         

          <div class="badgeLine">
            <span class="badge normal">정상 ${escapeHtml(summary.normal || 0)}</span>
            <span class="badge repair">수리 필요 ${escapeHtml(summary.repair || 0)}</span>
            <span class="badge arrow">6.5치 이하 ${escapeHtml(arrowBadges.under65 || 0)}</span>
            <span class="badge arrow">7치 이상 ${escapeHtml(arrowBadges.over7 || 0)}</span>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">수리 필요한 활</div>
          ${renderBowList(repairBows, "현재 수리가 필요한 활이 없습니다.")}
        </div>

        <div class="section" id="arrowSection">
          ${renderArrowSectionContent()}
        </div>

        <div class="hint">
          서울대학교 국궁부 공용 장비 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function normalizeCategories(categories) {
      const cleanCategories = categories.map((item) => ({
        label: String(item.label || "").trim(),
        quantity: Math.max(Number(item.quantity || 0), 0)
      })).filter((item) => item.label);

      return recalculateTotal(cleanCategories);
    }

    function recalculateTotal(categories) {
      const total = categories.reduce((sum, item) => {
        if (item.label === "총량") return sum;
        if (item.label === "수리 필요") return sum;
        return sum + Number(item.quantity || 0);
      }, 0);

      const totalItem = categories.find((item) => item.label === "총량");

      if (totalItem) {
        totalItem.quantity = total;
      } else {
        categories.push({
          label: "총량",
          quantity: total
        });
      }

      return categories;
    }

    function renderArrowSectionContent() {
      return `
        <div class="sectionTitle">화살 현황</div>
        ${renderArrowSummary()}

        <button id="arrowSaveBtn" class="saveBtn" onclick="saveArrowCategories()">
          화살 현황 저장
        </button>

        <div id="arrowSaveResult" class="saveResult"></div>

        <div class="arrowHelp">
          부러진 화살은 해당 분류에서 -를 누르고, 수리 필요에서 +를 누른 뒤 저장하세요.
        </div>
      `;
    }

   function renderArrowSummary() {
  return `
    ${renderArrowCategoryList()}
  `;
}

    function getArrowQuantity(label) {
      const item = arrowCategories.find((category) => category.label === label);
      return item ? item.quantity : 0;
    }

    function getEditableCategoryCount() {
      return arrowCategories.filter((item) => item.label !== "총량").length;
    }

    function renderArrowCategoryList() {
      if (!arrowCategories.length) {
        return `
          <div class="emptyBox" style="margin-top: 14px;">
            화살 분류 정보가 없습니다.
          </div>
        `;
      }

      return `
        <div class="arrowCategoryList">
          ${arrowCategories.map((item, index) => arrowCategoryItem(item, index)).join("")}
        </div>
      `;
    }

    function arrowCategoryItem(item, index) {
      const isTotal = item.label === "총량";
      const isRepair = item.label === "수리 필요";

      return `
        <div class="arrowCategoryItem ${isTotal ? "total" : ""} ${isRepair ? "repair" : ""}">
          <div class="arrowCategoryLabel">${escapeHtml(item.label)}</div>

          <div class="arrowControl">
            <button
              class="arrowControlBtn"
              onclick="changeArrowQuantity(${index}, -1)"
              ${isTotal ? "disabled" : ""}
              aria-label="${escapeHtml(item.label)} 감소"
            >-</button>

            <div class="arrowCategoryValue" id="arrowValue-${index}">
              ${escapeHtml(item.quantity)}
            </div>

            <button
              class="arrowControlBtn"
              onclick="changeArrowQuantity(${index}, 1)"
              ${isTotal ? "disabled" : ""}
              aria-label="${escapeHtml(item.label)} 증가"
            >+</button>
          </div>
        </div>
      `;
    }

    function changeArrowQuantity(index, delta) {
      if (!arrowCategories[index]) return;
      if (arrowCategories[index].label === "총량") return;

      const nextValue = Math.max(Number(arrowCategories[index].quantity || 0) + delta, 0);
      arrowCategories[index].quantity = nextValue;
      arrowCategories = recalculateTotal(arrowCategories);

      refreshArrowSection();
      clearSaveResult();
    }

    function refreshArrowSection() {
      const section = document.getElementById("arrowSection");
      if (!section) return;

      section.innerHTML = renderArrowSectionContent();
    }

    async function saveArrowCategories() {
      const btn = document.getElementById("arrowSaveBtn");
      const result = document.getElementById("arrowSaveResult");

      if (!btn || !result) return;

      btn.disabled = true;
      result.className = "saveResult";
      result.textContent = "저장 중...";

      try {
        const response = await fetch("/api/summary", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            categories: arrowCategories
          })
        });

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch (error) {
          throw new Error("서버가 JSON이 아닌 응답을 반환했습니다.");
        }

        if (!response.ok) {
          throw new Error(data?.message || data?.error || "저장 실패");
        }

        renderDashboard(data);

        const newResult = document.getElementById("arrowSaveResult");
        if (newResult) {
          newResult.textContent = data.message || "화살 현황이 저장되었습니다.";
          newResult.classList.add("success");
        }
      } catch (error) {
        result.textContent = "저장 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
      }
    }

    function clearSaveResult() {
      const result = document.getElementById("arrowSaveResult");
      if (result) {
        result.className = "saveResult";
        result.textContent = "";
      }
    }

    function statCard(label, value, className = "") {
      return `
        <div class="statCard ${className}">
          <div class="statLabel">${escapeHtml(label)}</div>
          <div class="statValue">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderBowList(items, emptyText) {
      if (!items.length) {
        return `
          <div class="emptyBox">
            ${escapeHtml(emptyText)}
          </div>
        `;
      }

      return `
        <div class="list">
          ${items.map(item => bowItem(item)).join("")}
        </div>
      `;
    }

    function bowItem(item) {
      const serial = item.serial || "-";
      const check = item.check || "-";

      return `
        <a class="item" href="/?id=${encodeURIComponent(serial)}">
          <div class="repairItem">
            <div class="repairTitle">
              ${escapeHtml(serial)}번 활
            </div>

            <div class="repairCheck">
              ${escapeHtml(check)}
            </div>
          </div>
        </a>
      `;
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          ${escapeHtml(message)}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공용 장비 현황</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green-bg: #dcfce7;
      --green-text: #166534;

      --red-bg: #fee2e2;
      --red-text: #991b1b;

      --yellow-bg: #fef3c7;
      --yellow-text: #92400e;

      --gray-bg: #e5e7eb;
      --gray-text: #374151;

      --blue-bg: #dbeafe;
      --blue-text: #1e40af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background:
        radial-gradient(circle at top left, #e0f2fe 0, transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 28px;
    }

    .loadingLogoWrap {
      min-height: calc(100dvh - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingLogo {
      width: 180px;
      height: auto;
      opacity: 0.7;
      filter: brightness(0);
    }

    .loginCard {
      min-height: calc(100dvh - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loginBox {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    .loginLogoWrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .loginLogo {
      width: 92px;
      height: auto;
      opacity: 0.92;
      filter: brightness(0);
    }

    .loginTitle {
      font-size: 23px;
      line-height: 1.15;
      font-weight: 950;
      letter-spacing: -0.045em;
      text-align: center;
      margin-bottom: 7px;
    }

  

    .loginError {
      min-height: 20px;
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 850;
      color: #991b1b;
      text-align: center;
      line-height: 1.4;
    }

    .loginInput {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 16px;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: 0.08em;
      outline: none;
      text-align: center;
      color: var(--text);
      background: #ffffff;
    }

    .loginInput:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.20);
    }

    .loginBtn {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 18px;
      padding: 15px;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
      background: #0f172a;
      color: white;
    }

    .loginBtn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .topCard {
      position: relative;
      overflow: hidden;
      min-height: 230px;
      background: linear-gradient(135deg, #121c2d 0%, #2d3e54 100%);
      color: white;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.22);
      margin-bottom: 14px;
    }

    .smallLabel {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
    }

    .mainTitle {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 18px;
    }

    .mainStatRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .mainStat {
      min-width: 0;
    }

    .mainStatLabel {
      font-size: 13px;
      font-weight: 850;
      color: rgba(255,255,255,0.64);
      margin-bottom: 7px;
    }

    .mainStatValue {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .mainNumber {
      font-size: 54px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .mainUnit {
      font-size: 19px;
      font-weight: 850;
      color: rgba(255,255,255,0.78);
    }

    .badgeLine {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: none;
    }

    .badge.normal {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .badge.repair {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .badge.bad {
      background: var(--yellow-bg);
      color: var(--yellow-text);
    }

    .badge.deleted {
      background: var(--gray-bg);
      color: var(--gray-text);
    }

    .badge.arrow {
      background: #e0f2fe;
      color: #075985;
    }

    .badge.borrow {
      background: var(--blue-bg);
      color: var(--blue-text);
    }

    .section {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 14px;
    }

    .sectionTitle {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 16px;
    }

    .actionItem {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .compactItem {
      gap: 12px;
      padding: 14px 15px;
    }

    .actionMain {
      min-width: 0;
    }

    .compactTitleRow {
      display: grid;
      grid-template-columns: minmax(0, auto) 1fr;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .actionTitle {
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -0.045em;
      margin-bottom: 5px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .compactItem .actionTitle {
      margin-bottom: 0;
      font-size: 22px;
      white-space: nowrap;
    }

    .sideInfo {
      min-width: 0;
      justify-self: end;
      text-align: right;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.25;
      color: #94a3b8;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .repairSideInfo {
      color: #9ca3af;
    }

    .borrowLineItem {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 15px;
    }

    .borrowLineTitle {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.045em;
      white-space: nowrap;
    }

    .borrowLineName {
      min-width: 0;
      font-size: 17px;
      font-weight: 900;
      color: #2563eb;
      text-align: left;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .borrowLineBtn {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      min-height: 36px;
      font-size: 13px;
      line-height: 1;
      font-weight: 950;
      cursor: pointer;
      white-space: nowrap;
      background: #dbeafe;
      color: #1e40af;
    }

    .actionBtns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }

    .compactItem .actionBtns {
      flex-direction: row;
      gap: 8px;
    }

    .miniActionBtn {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      line-height: 1;
      font-weight: 950;
      cursor: pointer;
      white-space: nowrap;
    }

    .compactItem .miniActionBtn {
      min-height: 36px;
      padding: 9px 14px;
    }

    .miniActionBtn.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .miniActionBtn.repair {
      background: #fee2e2;
      color: #991b1b;
    }

    .emptyBox {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      padding: 18px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 850;
      line-height: 1.45;
    }

    .lookupBox {
      display: flex;
      gap: 10px;
    }

    .lookupInput {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 17px;
      font-weight: 850;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .lookupBtn {
      flex: 0 0 auto;
      border: 0;
      border-radius: 16px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 950;
      color: white;
      background: #0f172a;
      cursor: pointer;
    }

    .lookupHint {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 850;
      color: var(--muted);
      line-height: 1.5;
    }

    .lookupSuggestions {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lookupSuggestion {
      width: 100%;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 13px 14px;
      background: #f8fafc;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .lookupSuggestionTop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .lookupSuggestionTitle {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .lookupSuggestionStatus {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 950;
      padding: 5px 9px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #0f172a;
    }

    .lookupSuggestionText {
      font-size: 13px;
      font-weight: 850;
      color: #64748b;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .arrowCategoryList {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .arrowCategoryItem {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 13px 15px;
    }

    .arrowCategoryLabel {
      font-size: 15px;
      font-weight: 850;
      color: #475569;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .arrowControl {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .arrowControlBtn {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
    }

    .arrowControlBtn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .arrowCategoryValue {
      min-width: 34px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      color: #0f172a;
    }

    .arrowCategoryItem.repair .arrowCategoryLabel,
    .arrowCategoryItem.repair .arrowCategoryValue {
      color: #991b1b;
    }

    .arrowCategoryItem.total {
      background: #eef2ff;
    }

    .arrowCategoryItem.total .arrowCategoryLabel,
    .arrowCategoryItem.total .arrowCategoryValue {
      color: #1e3a8a;
    }

    .saveBtn {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 950;
      color: white;
      background: #0f172a;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    .saveBtn:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .saveResult {
      margin-top: 12px;
      min-height: 22px;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.5;
      color: var(--muted);
      white-space: pre-line;
    }

    .saveResult.success {
      color: #166534;
    }

    .saveResult.error {
      color: #991b1b;
    }

    .arrowHelp {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.5;
    }

    .memoList {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 14px;
    }

    .memoItem {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 13px 14px;
    }

    .memoText {
      font-size: 15px;
      font-weight: 850;
      line-height: 1.45;
      color: #334155;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .memoDeleteBtn {
      border: 0;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
      background: #fee2e2;
      color: #991b1b;
    }

    .memoInputBox {
      display: flex;
      gap: 10px;
    }

    .memoInput {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 850;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .memoAddBtn {
      flex: 0 0 auto;
      border: 0;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 950;
      color: white;
      background: #0f172a;
      cursor: pointer;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .errorBox {
      background: #fff7f7;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 24px;
      padding: 22px;
      font-weight: 850;
      line-height: 1.5;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      white-space: pre-line;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .loginCard {
        align-items: flex-start;
        padding-top: 28px;
      }

      .loginBox {
        padding: 22px;
      }

      .loginLogoWrap {
        margin-bottom: 14px;
      }

      .loginLogo {
        width: 78px;
      }

      .loginTitle {
        font-size: 22px;
      }

      

      .loginError {
        margin-bottom: 10px;
        font-size: 13px;
      }

      .loginInput {
        padding: 15px;
        font-size: 23px;
      }

      .topCard {
        min-height: 210px;
        border-radius: 24px;
        padding: 24px 26px;
      }

      .mainTitle {
        font-size: 28px;
      }

      .mainNumber {
        font-size: 50px;
      }

      .mainUnit {
        font-size: 18px;
      }

      .section {
        border-radius: 22px;
        padding: 18px;
      }

      .actionItem {
        grid-template-columns: 1fr;
      }

      .compactTitleRow {
        grid-template-columns: minmax(0, auto) 1fr;
        gap: 8px;
      }

      .compactItem .actionTitle {
        font-size: 22px;
      }

      .sideInfo {
        font-size: 16px;
      }

      .actionBtns {
        flex-direction: row;
      }

      .compactItem .miniActionBtn {
        flex: 1;
      }

      .borrowLineItem {
        grid-template-columns: auto 1fr auto;
        gap: 9px;
      }

      .borrowLineTitle {
        font-size: 21px;
      }

      .borrowLineName {
        font-size: 16px;
      }

      .borrowLineBtn {
        padding: 9px 12px;
        font-size: 13px;
      }

      .lookupBox,
      .memoInputBox {
        gap: 8px;
      }

      .smallLabel,
      .mainTitle,
      .mainNumber,
      .sectionTitle,
      .actionTitle,
      .badge,
      .arrowCategoryValue,
      .arrowControlBtn,
      .saveBtn,
      .loginTitle,
      .loginBtn {
        font-weight: 900;
      }

      .mainUnit,
      .emptyBox,
      .hint,
      .arrowCategoryLabel,
      .arrowHelp,
      .saveResult,
      .lookupHint,
      .memoText,
      .loginError {
        font-weight: 850;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #2563eb;
      }

      body {
        background: #0b1020;
        color: var(--text);
      }

      .loadingLogo {
        filter: brightness(0) invert(1);
        opacity: 0.85;
      }

      .loginBox {
        background: #111827;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      }

      .loginLogo {
        filter: brightness(0) invert(1);
        opacity: 0.9;
      }

      .loginInput {
        background: #172033;
        border: none;
        color: #f8fafc;
      }

      .loginInput:focus {
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.16);
      }

      .loginBtn {
        background: #334155;
      }

      .loginError {
        color: #fca5a5;
      }

      .topCard {
        background: linear-gradient(
          135deg,
          rgba(248, 250, 252, 0.95) 0%,
          rgba(232, 241, 251, 0.95) 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #0f172a;
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        border: none;
      }

      .smallLabel {
        color: rgba(15, 23, 42, 0.62);
      }

      .mainStatLabel,
      .mainUnit {
        color: rgba(15, 23, 42, 0.62);
      }

      .section {
        background: #111827;
        border: none;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .sectionTitle {
        color: #f8fafc;
      }

      .item,
      .emptyBox,
      .arrowCategoryItem,
      .lookupSuggestion,
      .memoItem {
        background: #172033;
        border: none;
      }

      .emptyBox,
      .hint,
      .arrowCategoryLabel,
      .arrowHelp,
      .saveResult,
      .lookupHint,
      .lookupSuggestionText {
        color: #94a3b8;
      }

      .actionTitle,
      .borrowLineTitle,
      .lookupSuggestionTitle,
      .memoText {
        color: #f8fafc;
      }

      .sideInfo {
        color: #94a3b8;
      }

      .borrowLineName {
        color: #93c5fd;
      }

      .borrowLineBtn {
        background: #dbeafe;
        color: #1e40af;
      }

      .lookupInput,
      .memoInput {
        background: #172033;
        color: #f8fafc;
        border: none;
      }

      .lookupBtn,
      .memoAddBtn {
        background: #334155;
      }

      .arrowCategoryValue {
        color: #f8fafc;
      }

      .arrowControlBtn {
        background: #263449;
        color: #f8fafc;
      }

      .arrowCategoryItem.repair .arrowCategoryLabel,
      .arrowCategoryItem.repair .arrowCategoryValue {
        color: #fca5a5;
      }

      .arrowCategoryItem.total {
        background: #1e293b;
      }

      .arrowCategoryItem.total .arrowCategoryLabel,
      .arrowCategoryItem.total .arrowCategoryValue {
        color: #bfdbfe;
      }

      .saveBtn {
        background: #334155;
        box-shadow: none;
      }

      .saveResult.success {
        color: #86efac;
      }

      .saveResult.error {
        color: #fca5a5;
      }

      .errorBox {
        background: #2b1111;
        color: #fecaca;
        border-color: #7f1d1d;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="loadingLogoWrap">
      <img class="loadingLogo" src="/logo.png" alt="로딩 중">
    </div>
  </div>

  <script>
    const app = document.getElementById("app");

    let currentData = null;
    let arrowCategories = [];

    init();

    async function init() {
      try {
        const response = await fetch("/api/summary");
        const text = await response.text();

        let data;

        try {
          data = JSON.parse(text);
        } catch (error) {
          showError(
            "종합 관리 API가 JSON이 아닌 응답을 반환했습니다.\n" +
            "functions/api/summary.js 파일 위치와 배포 상태를 확인하세요."
          );
          return;
        }

        if (!response.ok) {
          if (response.status === 401 || data?.error === "unauthorized") {
            showDashboardLogin(data?.message || "");
            return;
          }

          showError(data?.message || data?.error || "종합 관리 정보를 불러오지 못했습니다.");
          return;
        }

        renderDashboard(data);
      } catch (error) {
        showError("불러오기 실패: " + error.message);
      }
    }

    function showLoading() {
      app.innerHTML = `
        <div class="loadingLogoWrap">
          <img class="loadingLogo" src="/logo.png" alt="로딩 중">
        </div>
      `;
    }

    function showDashboardLogin(message = "") {
      app.innerHTML = `
        <div class="loginCard">
          <div class="loginBox">
            <div class="loginLogoWrap">
              <img class="loginLogo" src="/logo2.png" alt="서울대학교 국궁부">
            </div>

            <div class="loginTitle">공용 장비 현황</div>
            
            <div id="dashboardLoginError" class="loginError">
              ${escapeHtml(message)}
            </div>

            <input
              id="dashboardPasswordInput"
              class="loginInput"
              type="password"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
              placeholder="비밀번호"
              onkeydown="handleDashboardLoginKey(event)"
            >

            <button id="dashboardLoginBtn" class="loginBtn" onclick="submitDashboardLogin()">
              확인
            </button>
          </div>
        </div>
      `;

      setTimeout(() => {
        document.getElementById("dashboardPasswordInput")?.focus();
      }, 80);
    }

    function handleDashboardLoginKey(event) {
      if (event.key === "Enter") {
        submitDashboardLogin();
      }
    }

    async function submitDashboardLogin() {
      const input = document.getElementById("dashboardPasswordInput");
      const btn = document.getElementById("dashboardLoginBtn");
      const error = document.getElementById("dashboardLoginError");

      const password = String(input?.value || "").trim();

      if (!password) {
        if (error) error.textContent = "비밀번호를 입력하세요.";
        input?.focus();
        return;
      }

      if (btn) btn.disabled = true;
      if (error) error.textContent = "확인 중...";

      try {
        const response = await fetch("/api/summary", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "dashboardLogin",
            password
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok) {
          throw new Error(data?.message || data?.error || "로그인 실패");
        }

        showLoading();
        await init();
      } catch (loginError) {
        if (error) {
          error.textContent = loginError.message;
        }

        if (input) {
          input.value = "";
          input.focus();
        }
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function renderDashboard(data) {
      currentData = data;

      const summary = data.summary || {};
      const repairBows = data.repairBows || [];
      const borrowedBows = data.borrowedBows || [];
      const arrowSummary = data.arrowSummary || {};
      const arrowBadges = arrowSummary.badges || {};
      const memos = data.memos || [];

      arrowCategories = normalizeCategories(arrowSummary.categories || []);

      app.innerHTML = `
        <div class="topCard">
          <div class="smallLabel">서울대학교 국궁부</div>
          <div class="mainTitle">공용 장비 현황</div>

          <div class="mainStatRow">
            <div class="mainStat">
              <div class="mainStatLabel">공용 활</div>
              <div class="mainStatValue">
                <div class="mainNumber">${escapeHtml(summary.topBowValue || summary.total || 0)}</div>
                <div class="mainUnit">장</div>
              </div>
            </div>

            <div class="mainStat">
              <div class="mainStatLabel">공용 화살</div>
              <div class="mainStatValue">
                <div class="mainNumber">${escapeHtml(arrowSummary.total || 0)}</div>
                <div class="mainUnit">대</div>
              </div>
            </div>
          </div>

          <div class="badgeLine">
            <span class="badge normal">정상 ${escapeHtml(summary.normal || 0)}</span>
            <span class="badge repair">수리 필요 ${escapeHtml(summary.repair || 0)}</span>
            <span class="badge borrow">반출 ${escapeHtml(borrowedBows.length || 0)}</span>
            <span class="badge arrow">6.5치 이하 ${escapeHtml(arrowBadges.under65 || 0)}</span>
            <span class="badge arrow">7치 이상 ${escapeHtml(arrowBadges.over7 || 0)}</span>
          </div>
        </div>

        <div class="section">
          <div class="sectionTitle">관리 메모</div>
          ${renderMemoSection(memos)}
        </div>

        <div class="section">
          <div class="sectionTitle">수리 필요한 활</div>
          ${renderRepairBowList(repairBows)}
        </div>

        <div class="section">
          <div class="sectionTitle">개인 반출 현황</div>
          ${renderBorrowedBowList(borrowedBows)}
        </div>

        <div class="section">
          <div class="sectionTitle">활 조회</div>

          <div class="lookupBox">
            <input
              id="bowLookupInput"
              class="lookupInput"
              type="text"
              inputmode="text"
              placeholder="일련번호, 파운드, 반출자 검색"
              oninput="renderLookupSuggestions()"
              onkeydown="handleLookupKey(event)"
            >

            <button class="lookupBtn" onclick="lookupBow()">
              조회
            </button>
          </div>

          <div id="lookupSuggestions" class="lookupSuggestions"></div>

          <div class="lookupHint">
            숫자는 공용 활 일련번호로, 문자는 개인 장비 식별코드 또는 공용 활 검색어로 처리합니다.
          </div>
        </div>

        <div class="section" id="arrowSection">
          ${renderArrowSectionContent()}
        </div>

        <div class="hint">
          서울대학교 국궁부 공용 장비 관리 체계<br>
          Copyright © Seoul National University Korean Archery Club. All Rights Reserved.
        </div>
      `;
    }

    function renderMemoSection(memos) {
      const listHtml = memos.length
        ? `
          <div class="memoList">
            ${memos.map((memo) => `
              <div class="memoItem">
                <div class="memoText">${escapeHtml(memo.text)}</div>
                <button class="memoDeleteBtn" onclick="deleteMemo(${memo.index})">삭제</button>
              </div>
            `).join("")}
          </div>
        `
        : `
          <div class="emptyBox" style="margin-bottom: 14px;">
            등록된 관리 메모가 없습니다.
          </div>
        `;

      return `
        ${listHtml}

        <div class="memoInputBox">
          <input
            id="memoInput"
            class="memoInput"
            type="text"
            placeholder="새 메모 입력"
            onkeydown="handleMemoKey(event)"
          >

          <button class="memoAddBtn" onclick="addMemo()">
            추가
          </button>
        </div>

        <div id="memoResult" class="saveResult"></div>
      `;
    }

    function handleMemoKey(event) {
      if (event.key === "Enter") {
        addMemo();
      }
    }

    async function addMemo() {
      const input = document.getElementById("memoInput");
      const result = document.getElementById("memoResult");
      const text = String(input?.value || "").trim();

      if (!text) {
        input?.focus();
        return;
      }

      if (result) {
        result.className = "saveResult";
        result.textContent = "저장 중...";
      }

      try {
        const data = await postSummary({
          action: "addMemo",
          text
        });

        renderDashboard(data);
      } catch (error) {
        if (result) {
          result.textContent = "저장 실패: " + error.message;
          result.classList.add("error");
        }
      }
    }

    async function deleteMemo(index) {
      if (!confirm("이 메모를 삭제할까요?")) return;

      try {
        const data = await postSummary({
          action: "deleteMemo",
          index
        });

        renderDashboard(data);
      } catch (error) {
        alert("삭제 실패: " + error.message);
      }
    }

    function renderRepairBowList(items) {
      if (!items.length) {
        return `
          <div class="emptyBox">
            현재 수리가 필요한 활이 없습니다.
          </div>
        `;
      }

      return `
        <div class="list">
          ${items.map(item => repairBowItem(item)).join("")}
        </div>
      `;
    }

    function repairBowItem(item) {
      const serial = item.serial || "-";
      const check = item.check || "-";

      return `
        <div class="item actionItem compactItem">
          <div class="actionMain">
            <div class="compactTitleRow">
              <div class="actionTitle">${escapeHtml(serial)}번 활</div>
              <div class="sideInfo repairSideInfo">${escapeHtml(check)}</div>
            </div>
          </div>

          <div class="actionBtns">
            <button class="miniActionBtn secondary" onclick="openBow('${escapeJs(serial)}')">
              상세
            </button>
            <button class="miniActionBtn repair" onclick="completeRepair('${escapeJs(serial)}')">
              수리 완료
            </button>
          </div>
        </div>
      `;
    }

    function renderBorrowedBowList(items) {
      if (!items.length) {
        return `
          <div class="emptyBox">
            현재 개인 반출 중인 활이 없습니다.
          </div>
        `;
      }

      return `
        <div class="list">
          ${items.map(item => borrowedBowItem(item)).join("")}
        </div>
      `;
    }

    function borrowedBowItem(item) {
      const serial = item.serial || "-";
      const borrowedBy = item.borrowedBy || "-";

      return `
        <div class="item borrowLineItem">
          <div class="borrowLineTitle">${escapeHtml(serial)}번 활</div>
          <div class="borrowLineName">${escapeHtml(borrowedBy)}</div>

          <button class="borrowLineBtn" onclick="completeReturn('${escapeJs(serial)}')">
            반납 완료
          </button>
        </div>
      `;
    }

    async function completeRepair(serial) {
      if (!confirm(`${serial}번 활을 수리 완료 처리할까요?`)) return;

      try {
        const data = await postSummary({
          action: "completeRepair",
          serial
        });

        renderDashboard(data);
      } catch (error) {
        alert("수리 완료 처리 실패: " + error.message);
      }
    }

    async function completeReturn(serial) {
      if (!confirm(`${serial}번 활을 반납 완료 처리할까요?`)) return;

      try {
        const data = await postSummary({
          action: "completeReturn",
          serial
        });

        renderDashboard(data);
      } catch (error) {
        alert("반납 완료 처리 실패: " + error.message);
      }
    }

    function openBow(serial) {
      window.location.href = `/?id=${encodeURIComponent(serial)}`;
    }

    function lookupBow() {
      const input = document.getElementById("bowLookupInput");
      const value = String(input?.value || "").trim();

      if (!value) {
        input?.focus();
        return;
      }

      const matches = getLookupMatches(value);

      if (matches.length === 1) {
        openBow(matches[0].serial);
        return;
      }

      const exactPublicBow = (currentData?.bows || []).find((item) => {
        return String(item.serial || "").trim() === value;
      });

      if (exactPublicBow) {
        openBow(exactPublicBow.serial);
        return;
      }

      const isPublicBow = /^[0-9]+$/.test(value);

      if (isPublicBow) {
        window.location.href = `/?id=${encodeURIComponent(value)}`;
      } else {
        window.location.href = `/?t=p&c=${encodeURIComponent(value)}`;
      }
    }

    function handleLookupKey(event) {
      if (event.key === "Enter") {
        lookupBow();
      }
    }

    function renderLookupSuggestions() {
      const container = document.getElementById("lookupSuggestions");
      const input = document.getElementById("bowLookupInput");

      if (!container || !input) return;

      const query = String(input.value || "").trim();

      if (!query) {
        container.innerHTML = "";
        return;
      }

      const matches = getLookupMatches(query).slice(0, 6);

      if (!matches.length) {
        container.innerHTML = `
          <div class="emptyBox">
            공용 활 검색 결과가 없습니다. 개인 장비 식별코드라면 조회 버튼을 누르세요.
          </div>
        `;
        return;
      }

      container.innerHTML = matches.map((item) => lookupSuggestionItem(item)).join("");
    }

    function getLookupMatches(query) {
      const q = String(query || "").trim().toLowerCase();
      if (!q) return [];

      const bows = currentData?.bows || [];

      return bows.filter((item) => {
        const haystack = [
          item.serial,
          item.brand,
          item.size,
          item.pound,
          item.status,
          item.etc,
          item.check,
          item.borrowedBy
        ].map((value) => String(value || "").toLowerCase()).join(" ");

        return haystack.includes(q);
      }).sort((a, b) => sortBySerialValue(a.serial, b.serial));
    }

    function lookupSuggestionItem(item) {
      const serial = item.serial || "-";
      const status = item.status || "-";
      const info = `${item.brand || "-"} / ${item.size || "-"} / ${item.pound || "-"}lb`;
      const borrowed = item.borrowedBy ? ` / 반출: ${item.borrowedBy}` : "";

      return `
        <button class="lookupSuggestion" onclick="openBow('${escapeJs(serial)}')">
          <div class="lookupSuggestionTop">
            <div class="lookupSuggestionTitle">${escapeHtml(serial)}번 활</div>
            <div class="lookupSuggestionStatus">${escapeHtml(status)}</div>
          </div>
          <div class="lookupSuggestionText">
            ${escapeHtml(info + borrowed)}
          </div>
        </button>
      `;
    }

    function normalizeCategories(categories) {
      const cleanCategories = categories.map((item) => ({
        label: String(item.label || "").trim(),
        quantity: Math.max(Number(item.quantity || 0), 0)
      })).filter((item) => item.label);

      return recalculateTotal(cleanCategories);
    }

    function recalculateTotal(categories) {
      const total = categories.reduce((sum, item) => {
        if (item.label === "총량") return sum;
        if (item.label === "수리 필요") return sum;
        return sum + Number(item.quantity || 0);
      }, 0);

      const totalItem = categories.find((item) => item.label === "총량");

      if (totalItem) {
        totalItem.quantity = total;
      } else {
        categories.push({
          label: "총량",
          quantity: total
        });
      }

      return categories;
    }

    function renderArrowSectionContent() {
      return `
        <div class="sectionTitle">화살 현황</div>
        ${renderArrowSummary()}

        <button id="arrowSaveBtn" class="saveBtn" onclick="saveArrowCategories()">
          화살 현황 저장
        </button>

        <div id="arrowSaveResult" class="saveResult"></div>

        <div class="arrowHelp">
          부러진 화살은 해당 분류에서 -를 누르고, 수리 필요에서 +를 누른 뒤 저장하세요.
        </div>
      `;
    }

    function renderArrowSummary() {
      return `
        ${renderArrowCategoryList()}
      `;
    }

    function renderArrowCategoryList() {
      if (!arrowCategories.length) {
        return `
          <div class="emptyBox" style="margin-top: 14px;">
            화살 분류 정보가 없습니다.
          </div>
        `;
      }

      return `
        <div class="arrowCategoryList">
          ${arrowCategories.map((item, index) => arrowCategoryItem(item, index)).join("")}
        </div>
      `;
    }

    function arrowCategoryItem(item, index) {
      const isTotal = item.label === "총량";
      const isRepair = item.label === "수리 필요";

      return `
        <div class="arrowCategoryItem ${isTotal ? "total" : ""} ${isRepair ? "repair" : ""}">
          <div class="arrowCategoryLabel">${escapeHtml(item.label)}</div>

          ${
            isTotal
              ? `
                <div class="arrowControl">
                  <div class="arrowControlBtn" style="visibility:hidden;">-</div>

                  <div class="arrowCategoryValue" id="arrowValue-${index}">
                    ${escapeHtml(item.quantity)}
                  </div>

                  <div class="arrowControlBtn" style="visibility:hidden;">+</div>
                </div>
              `
              : `
                <div class="arrowControl">
                  <button
                    class="arrowControlBtn"
                    onclick="changeArrowQuantity(${index}, -1)"
                    aria-label="${escapeHtml(item.label)} 감소"
                  >-</button>

                  <div class="arrowCategoryValue" id="arrowValue-${index}">
                    ${escapeHtml(item.quantity)}
                  </div>

                  <button
                    class="arrowControlBtn"
                    onclick="changeArrowQuantity(${index}, 1)"
                    aria-label="${escapeHtml(item.label)} 증가"
                  >+</button>
                </div>
              `
          }
        </div>
      `;
    }

    function changeArrowQuantity(index, delta) {
      if (!arrowCategories[index]) return;
      if (arrowCategories[index].label === "총량") return;

      const nextValue = Math.max(Number(arrowCategories[index].quantity || 0) + delta, 0);
      arrowCategories[index].quantity = nextValue;
      arrowCategories = recalculateTotal(arrowCategories);

      refreshArrowSection();
      clearSaveResult();
    }

    function refreshArrowSection() {
      const section = document.getElementById("arrowSection");
      if (!section) return;

      section.innerHTML = renderArrowSectionContent();
    }

    async function saveArrowCategories() {
      const btn = document.getElementById("arrowSaveBtn");
      const result = document.getElementById("arrowSaveResult");

      if (!btn || !result) return;

      btn.disabled = true;
      result.className = "saveResult";
      result.textContent = "저장 중...";

      try {
        const data = await postSummary({
          action: "saveArrowCategories",
          categories: arrowCategories
        });

        renderDashboard(data);

        const newResult = document.getElementById("arrowSaveResult");
        if (newResult) {
          newResult.textContent = data.message || "화살 현황이 저장되었습니다.";
          newResult.classList.add("success");
        }
      } catch (error) {
        result.textContent = "저장 실패: " + error.message;
        result.classList.add("error");
      } finally {
        btn.disabled = false;
      }
    }

    async function postSummary(body) {
      const response = await fetch("/api/summary", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const text = await response.text();

      let data;

      try {
        data = JSON.parse(text);
      } catch (error) {
        throw new Error("서버가 JSON이 아닌 응답을 반환했습니다.");
      }

      if (!response.ok) {
        if (response.status === 401 || data?.error === "unauthorized") {
          showDashboardLogin(data?.message || "");
          throw new Error("대시보드 인증이 필요합니다.");
        }

        throw new Error(data?.message || data?.error || "요청 실패");
      }

      return data;
    }

    function clearSaveResult() {
      const result = document.getElementById("arrowSaveResult");
      if (result) {
        result.className = "saveResult";
        result.textContent = "";
      }
    }

    function sortBySerialValue(a, b) {
      const aNum = Number(a);
      const bNum = Number(b);

      if (Number.isFinite(aNum) && Number.isFinite(bNum)) {
        return aNum - bNum;
      }

      return String(a).localeCompare(String(b), "ko", {
        numeric: true
      });
    }

    function showError(message) {
      app.innerHTML = `
        <div class="errorBox">
          ${escapeHtml(message)}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
